# Note that there is NO phoenix-ui-app (Core App) deployment anywhere in the existing k8s clusters
# instead, a Brand App is deployed.
image:
  name: phoenix-ui-office

apiGlobalEndpoint: "https://api.dev.phoenix.viegg.net"
cdnUrl: "https://cdn.vie.gg/phoenix/static"
envName: development
showForSubmission: 0
wsGlobalEndpoint: "wss://ws-api.dev.phoenix.viegg.net/web-socket"
geocomply:
  env: "staging"
  mobileServiceUrl: "https://stg-es.geocomply.net/oobee.php"
  oobeeUrl: "https://nj-stg-oobee.geocomply.net"

imagePullSecrets: [ecr-docker-credentials]

ingress:
  host: office.dev.phoenix.viegg.net

  alb:
    group: null
    customerOwnedIP:
      enabled: false

  whitelistedIps:
    - 212.250.151.148/32 # VPN: fw01-lon.argyll.tech
    - 212.250.151.149/32 # VPN: fw02-lon.argyll.tech
    - 178.23.129.249/32  # VPN: fw01-ghd.flipsports.net
    - 107.22.63.253/32   # VPN: twingate-phoenix-dev-connector-13
    - 34.206.153.88/32   # VPN: twingate-phoenix-dev-connector-14
    # We don't need to include Jenkins among the whitelisted IPs here;
    # deployments are managed by ArgoCD living inside the k8s cluster.
    - 50.242.31.90/32 # NJDGE's outgoing IPs
    - 73.195.83.224/32
    - 76.117.27.62/32
    - 108.11.8.209/32
