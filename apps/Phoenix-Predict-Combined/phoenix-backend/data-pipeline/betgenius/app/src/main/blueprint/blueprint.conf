blueprint {

  streamlets {
    betgenius-http-ingestor = phoenix.betgenius.streamlets.BetgeniusHttpIngestor
    betgenius-ingest-converter = phoenix.betgenius.streamlets.BetgeniusIngestConverter
  }

  topics {
    betgenius-http-ingest-valid {
      topic.name = "phoenix-intake.betgenius-http-valid"
      producers = [betgenius-http-ingestor.valid]
      consumers = [betgenius-ingest-converter.in]
    }

    betgenius-fixture-changes {
      topic.name = "phoenix-intake.betgenius-fixtures"
      producers = [betgenius-ingest-converter.fixture-events]
    }
  }
}
