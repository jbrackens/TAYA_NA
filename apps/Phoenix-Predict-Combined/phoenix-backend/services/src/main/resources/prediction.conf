phoenix {
  prediction {
    market-factory {
      enabled = true
      btc {
        instrument-symbol = "BTC-USD"
        default-reference-price = 100000
        thresholds = [90000, 100000, 110000]
        settlement-source-key = "crypto.primary"
        fallback-source-key = "crypto.fallback"
        resolution-rule = "close_price_gt_threshold"
        market-open-ahead = 0.seconds
        market-trading-window = 1.day
        periodic-worker {
          name = "prediction-btc-market-factory-worker"
          schedule = "mode=recurring,every=30.minutes"
          time-restriction = 2.minutes
          max-retries = 0
        }
      }
    }
  }
}
