include "application-base"

akka {

  # For the sample, just bind to loopback and do not allow access from the network
  # the port is overridden by the logic in main class
  remote.artery {
    canonical.port = 0
    canonical.hostname = 127.0.0.1
  }

  cluster {
    seed-nodes = [
      "akka://Phoenix@127.0.0.1:2552"
    ]
  }
}

jdbc-journal.bufferSize = 10000

phoenix {
  sports {
    display-new-sports-to-punters-by-default = true
  }
  mockData {
    data-ingestion-enabled = true
  }
}
