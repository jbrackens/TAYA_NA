phoenix.oddin {
  # Set to 'no' to prevent data ingestion from clogging the logs
  data-ingestion-enabled = yes
  data-ingestion-enabled = ${?PHOENIX_ODDIN_DATA_INGESTION_ENABLED}
  # Toggle Oddin to use common data API models
  use-common-data-api-model = false
  use-common-data-api-model = ${?PHOENIX_ODDIN_USE_COMMON_DATA_API_MODEL}
  kafka {
    # if 'yes' then data will be consumed from Kafka.
    # if 'no' then the data pipeline will be constructed on a cluster node.
    enabled = no
    enabled = ${?PHOENIX_ODDIN_KAFKA_INGESTION_ENABLED}
    consumer {
      bootstrap-servers = "localhost:9092"
      bootstrap-servers = ${?PHOENIX_ODDIN_KAFKA_CONSUMER_BOOTSTRAP_SERVERS}
      # WARN: please make sure this value is:
      # 1. unique for each developer
      # AND
      # 2. different than we use on DEV/PROD, to avoid interference with the real process accidentally
      group-id = "phoenix-backend-localdev-consumer-group"
      group-id = ${?PHOENIX_ODDIN_KAFKA_CONSUMER_GROUPID}
    }
  }
}
