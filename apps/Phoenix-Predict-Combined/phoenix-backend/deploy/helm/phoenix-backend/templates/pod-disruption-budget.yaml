{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    {{- include "phoenix-backend.labels" . | nindent 4 }}
  name: {{ include "phoenix-backend.fullname" . }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: phoenix-backend
{{- end }}
