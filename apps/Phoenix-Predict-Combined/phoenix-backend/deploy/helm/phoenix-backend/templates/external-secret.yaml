# A prefix added on all the secret names. Specific to each environment.
{{ $prefix := .Values.externalSecrets.remoteRefPathPrefix }}

# The key of the map is the name of the secret found in AWS secretsmanager
# and the value is a list of keys found within the secret object.
{{ $secrets := dict "dev-routes" (list "username" "password")
                    "betgenius"  (list "api-access-token"
                                       "api-password")
                    "geocomply"  (list "api-key"
                                       "decryption-initialization-vector"
                                       "decryption-key"
                                       "secret-key")
                    "idcomply"   (list "api-key")
                    "oddin"      (list "access-token")
                    "pxp"        (list "merchant-id"
                                       "shop-id"
                                       "username"
                                       "password"
                                       "webhook-username"
                                       "webhook-password")
                    "sendgrid"   (list "api-key")
                    "ssn"        (list "encryption-password")
                    "sftp"       (list "user"
                                       "password")
                    "twilio"     (list "account-service-id"
                                       "verification-service-id"
                                       "auth-token")
}}

apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: phoenix-backend-secrets
  # We need to ensure that the secret is created before the secret-checket hook runs.
  # By default any custom CRD objects will be install last by Helm.
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: ClusterSecretStore
  target:
    name: phoenix-backend-secrets
    creationPolicy: Owner
  data:
  {{- range $secretName, $secretKeys := $secrets }}
    {{- range $secretKeys }}
    - secretKey: "{{ $secretName }}-{{ . }}"
      remoteRef:
        key: "{{ $prefix }}/{{ $secretName }}"
        property: {{ . }}
    {{- end }}
  {{- end }}
