{{ if .Values.argocd.awaitRolloutComplete }}

kind: ServiceAccount
apiVersion: v1
metadata:
  name: await-rollout-complete
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "900"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed

---

kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: await-rollout-complete
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "910"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
  # Just enough permissions to `kubectl rollout status deployment/phoenix-backend`
  - apiGroups: [apps]
    resources: [deployments]
    resourceNames: [phoenix-backend]
    verbs: [get, list, watch]

---

kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: await-rollout-complete
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "920"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: await-rollout-complete
subjects:
  - kind: ServiceAccount
    name: await-rollout-complete

{{ end }}
