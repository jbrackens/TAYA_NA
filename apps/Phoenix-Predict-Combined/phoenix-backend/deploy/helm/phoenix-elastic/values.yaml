# We're overriding values of a subchart, hence top-level per-subchart sections are necessary:
# https://helm.sh/docs/chart_template_guide/subcharts_and_globals/#overriding-values-from-a-parent-chart
filebeat:
  filebeatConfig:
    # language=yaml
    filebeat.yml: |
      filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        json.keys_under_root: true
        json.add_error_key: true
        json.overwrite_keys: true
        json.ignore_decoding_error: true
        processors:
          - add_kubernetes_metadata:
              host: ${NODE_NAME}
              matchers:
              - logs_path:
                  logs_path: "/var/log/containers/"
          - drop_event:
              when:
                not:
                  or:
                    - equals:
                        "kubernetes.labels.app": "phoenix-backend"
                    - equals:
                        "kubernetes.labels.app": "phoenix-keycloak-to-db-migration"
                    - equals:
                        "kubernetes.namespace": "cloudflow"
                    - equals:
                        "kubernetes.namespace": "keycloak"
                    - equals:
                        "kubernetes.namespace": "argocd"
                    - equals:
                        "kubernetes.namespace": "postgres-operator"
      output.elasticsearch:
        host: '${NODE_NAME}'
        hosts: '${ELASTICSEARCH_HOSTS:elasticsearch-master:9200}'

elasticsearch:
  volumeClaimTemplate:
    accessModes: ["ReadWriteOnce"]
    resources:
      requests:
        storage: 60Gi

kibana:
  kibanaConfig:
    # language=yaml
    kibana.yml: |
      # Required in order to activate alerts - key is used to encrypt alert data to avoid plain text PII stored in DB
      xpack.encryptedSavedObjects.encryptionKey: "something_at_least_32_characters"
  ingress:
    enabled: true
    # The default className value is nginx which is not used.
    className: ""
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/backend-protocol: HTTP
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
    path: /*
    # `hosts`  should be defined on per-env basis
