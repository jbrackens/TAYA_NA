kind: Pod
apiVersion: v1
metadata:
  name: setup-keycloak-db-secret-for-postgres-operator
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "40"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  serviceAccountName: setup-keycloak-db-secret-for-postgres-operator
  restartPolicy: Never
  volumes:
    - name: scripts
      configMap:
        name: setup-keycloak-db-secret-for-postgres-operator
  containers:
    - name: setup-keycloak-db-secret-for-postgres-operator
      image: bitnami/kubectl:1.21
      command: ["/bin/bash"]
      args:
        - "/scripts/setup-keycloak-db-secret-for-postgres-operator.sh"
        - "{{ .Values.postgresOperator.dbName }}"
        - "{{ .Values.postgresOperator.dbHost }}"
        - "{{ .Values.postgresOperator.dbOwnerSecretName }}"
      volumeMounts:
        - name: scripts
          mountPath: /scripts
      securityContext:
        # User and group 1001 are readily available in `bitnami/kubectl` image.
        allowPrivilegeEscalation: false
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
