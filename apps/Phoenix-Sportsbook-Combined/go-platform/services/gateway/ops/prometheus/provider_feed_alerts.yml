groups:
  - name: phoenix-provider-feed-slo
    rules:
      - alert: PhoenixProviderRuntimeDown
        expr: phoenix_provider_runtime_enabled{service="gateway"} == 0
        for: 5m
        labels:
          severity: critical
          service: gateway
          team: trading-ops
        annotations:
          summary: "Provider runtime disabled or down"
          description: "Gateway provider runtime has reported disabled/down for more than 5 minutes."

      - alert: PhoenixProviderStreamUnhealthy
        expr: phoenix_provider_streams_unhealthy_total{service="gateway"} > 0
        for: 2m
        labels:
          severity: warning
          service: gateway
          team: trading-ops
        annotations:
          summary: "One or more provider streams are unhealthy"
          description: "At least one provider stream is breaching lag/gap/duplicate SLO or is in error."

      - alert: PhoenixProviderLagSLOBreach
        expr: phoenix_provider_stream_slo_breach{service="gateway",type="lag"} > 0
        for: 2m
        labels:
          severity: warning
          service: gateway
          team: trading-ops
        annotations:
          summary: "Provider stream lag SLO breach"
          description: "A provider stream is above configured lag threshold."

      - alert: PhoenixProviderGapSLOBreach
        expr: phoenix_provider_stream_slo_breach{service="gateway",type="gap"} > 0
        for: 1m
        labels:
          severity: critical
          service: gateway
          team: trading-ops
        annotations:
          summary: "Provider stream gap detected"
          description: "A provider stream has detected a revision/sequence gap."

      - alert: PhoenixProviderDuplicateSLOBreach
        expr: phoenix_provider_stream_slo_breach{service="gateway",type="duplicate"} > 0
        for: 2m
        labels:
          severity: warning
          service: gateway
          team: trading-ops
        annotations:
          summary: "Provider stream duplicate threshold breach"
          description: "A provider stream duplicate counter exceeded configured threshold."

      - alert: PhoenixProviderStreamError
        expr: phoenix_provider_stream_slo_breach{service="gateway",type="error"} > 0
        for: 30s
        labels:
          severity: critical
          service: gateway
          team: trading-ops
        annotations:
          summary: "Provider stream is in error state"
          description: "Provider runtime reports an active stream error for at least 30 seconds."

  - name: phoenix-trading-quality
    rules:
      - alert: PhoenixAlternativeOfferCommitExpiryRatioLow
        expr: |
          (
            increase(phoenix_bet_offer_committed_total{service="gateway"}[30m])
            /
            clamp_min(increase(phoenix_bet_offer_expired_total{service="gateway"}[30m]), 1)
          ) < 0.50
          and increase(phoenix_bet_offer_expired_total{service="gateway"}[30m]) >= 10
        for: 15m
        labels:
          severity: warning
          service: gateway
          team: trading-ops
        annotations:
          summary: "Alternative offer commit/expire ratio is degraded"
          description: "Commit-to-expire ratio has remained below 0.50 for 15m with at least 10 expiries in the 30m window."

      - alert: PhoenixCashoutStaleRejectSpike
        expr: increase(phoenix_cashout_quote_stale_reject_total{service="gateway"}[10m]) >= 5
        for: 5m
        labels:
          severity: warning
          service: gateway
          team: trading-ops
        annotations:
          summary: "Cashout stale-quote rejects are spiking"
          description: "At least 5 stale quote rejects occurred over 10 minutes and persisted for 5 minutes."
