apiVersion: v1
kind: Service
metadata:
  name: {{ include "phoenix-ui.fullname" . }}
  labels:
    {{- include "phoenix-ui.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "phoenix-ui.selectorLabels" . | nindent 4 }}
