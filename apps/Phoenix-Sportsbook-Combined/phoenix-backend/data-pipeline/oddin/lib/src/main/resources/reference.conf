default-cache {
  initial-capacity = 300
  max-capacity = 300
  time-to-live = 24.hours
  time-to-idle = 1.hour
}

default-flow {
  restart-min-backoff = "1s"
  restart-max-backoff = "60s"
  restart-random-factor = 0.1
  max-restarts = 10
  event-builder-parallelism = 1
  context-ask-parallelism = 1
}

phoenix.oddin {

  api-config {
    # Oddin environment can be either INTEGRATION or PRODUCTION
    environment = "INTEGRATION"
    environment = ${?ODDIN_ENVIRONMENT}
    url = "https://api-mq.integration.oddin.gg"
    url = ${?ODDIN_REST_BASE_URL}
    node-id = "1"
    node-id = ${?ODDIN_NODE_ID}
    access-token = "secret-token"
    access-token = ${?ODDIN_ACCESS_TOKEN}
  }

  match-summary-cache = ${default-cache}
  market-descriptions-cache = ${default-cache} {
    initial-capacity = 1
    max-capacity = 1
  }
  market-id-mapper-cache = ${default-cache} {
    max-capacity = 8000
  }

  market-flow = ${default-flow}
  fixture-flow = ${default-flow}
  market-settlement-flow = ${default-flow}
  market-cancel-flow = ${default-flow}
  match-status-update-flow = ${default-flow}
}

phoenix.betgenius {
  api-config {
    url = "https://api.geniussports.com"
    username = "esportsentertainmentgroup"
    password = "betgenius-api-password"
    password = ${?BETGENIUS_API_PASSWORD}
    access-token = "betgenius-api-token"
    access-token = ${?BETGENIUS_API_ACCESS_TOKEN}
    environment = "INT"
    environment = ${?BETGENIUS_API_ENVIRONMENT}
  }
}