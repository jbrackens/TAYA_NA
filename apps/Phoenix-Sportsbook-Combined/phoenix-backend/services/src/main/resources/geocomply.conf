phoenix.geocomply {

  api-key = "[i-should-have-been-injected-from-env]"
  api-key = ${?GEOCOMPLY_API_KEY}
  secret-key = "[i-should-have-been-injected-from-env]"
  secret-key = ${?GEOCOMPLY_SECRET_KEY}
  license-base-url = "[i-should-have-been-injected-from-env]"
  license-base-url = ${?GEOCOMPLY_LICENSE_BASE_URL}
  license-server-uri = ${phoenix.geocomply.license-base-url}"/license.php?akey="${phoenix.geocomply.api-key}"&skey="${phoenix.geocomply.secret-key}
  delay-padding = 5.minutes
  //this needs to be proper 16bytes, hex encoded string, otherwise app will not work - used "16byteTestVector"
  decryption-initialization-vector = "31366279746554657374566563746f72"
  decryption-initialization-vector = ${?GEOCOMPLY_DECRYPTION_INITIALIZATION_VECTOR}
  //as above - used "16bytesStrongKey"
  decryption-key = "313662797465735374726f6e674b6579"
  decryption-key = ${?GEOCOMPLY_DECRYPTION_KEY}
}