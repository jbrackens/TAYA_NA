kind: ConfigMap
apiVersion: v1
metadata:
  name: setup-keycloak-db-secret-for-postgres-operator
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
data:
  {{ (.Files.Glob "scripts/setup-keycloak-db-secret-for-postgres-operator.sh").AsConfig | nindent 2 }}
