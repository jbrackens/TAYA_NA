apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: setup-realm-and-client
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "900"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - secrets
  verbs:
  - list
  - get
  - watch

---

kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: setup-realm-and-client
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
subjects:
- kind: ServiceAccount
  name: setup-realm-and-client
roleRef:
  kind: Role
  name: setup-realm-and-client
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: setup-realm-and-client
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "20"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
