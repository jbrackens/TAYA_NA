apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "phoenix-backend.fullname" . }}
  labels:
    {{- include "phoenix-backend.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-1-2017-01
    {{- if .Values.ingress.alb.group }}
    alb.ingress.kubernetes.io/group.name: "{{ .Values.ingress.alb.group }}"
    {{- end }}
    {{- if .Values.ingress.whitelistedIps.main }}
    alb.ingress.kubernetes.io/inbound-cidrs: "{{ join "," .Values.ingress.whitelistedIps.main }}"
    {{- end }}
    # The customerOwnedIPs are present on the main ingress regardless of the usage of alb.groups.
    # The reason is that the annotations are exclusive regarding the other ingresses that are sharing the same alb
    # group. They still need to be present on at least one member of the group.
    {{ if .Values.ingress.alb.customerOwnedIP.enabled }}
    alb.ingress.kubernetes.io/customer-owned-ipv4-pool: "{{ .Values.ingress.alb.customerOwnedIP.ipv4poolCoip }}"
    alb.ingress.kubernetes.io/subnets: "{{ .Values.ingress.alb.customerOwnedIP.outpostPublicSubnetID }}"
    {{- end }}
spec:
  rules:
    - host: ws-api.{{ .Values.ingress.baseDNS }}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "phoenix-backend.fullname" . }}
                port: { name: websocket }
    - host: api.{{ .Values.ingress.baseDNS }}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "phoenix-backend.fullname" . }}
                port: { name: public-api }
    {{ if .Values.ingress.exposeDevApi }}
    - host: dev-api.{{ .Values.ingress.baseDNS }}
      http:
        paths:
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "phoenix-backend.fullname" . }}
                port: { name: dev-api }
    {{- end }}
