# Infrastructure

argocd:
  # Only enabled for the sake of subsequent contract tests, executed from Jenkins.
  awaitRolloutComplete: true
  rollouts:
    enabled: true
    autoPromotionEnabled: true

externalSecrets:
  remoteRefPathPrefix: dev/phoenix
  secretStore: main

flyway:
  outOfOrder: false

imagePullSecrets: [ecr-docker-credentials]

ingress:
  baseDNS: dev.phoenix.darkstormlabs.net
  exposeDevApi: true

  alb:
    # Grouping is not enabled for DEV which is not an Outpost deployment.
    group: null

    customerOwnedIP:
      enabled: false

  whitelistedIps:
    main:
      - 212.250.151.148/32  # VPN: fw01-lon.argyll.tech
      - 212.250.151.149/32  # VPN: fw02-lon.argyll.tech
      - 178.23.129.249/32   # VPN: fw01-ghd.flipsports.net
      - 107.22.63.253/32    # VPN: twingate-phoenix-dev-connector-13
      - 34.206.153.88/32    # VPN: twingate-phoenix-dev-connector-14
      - 54.194.105.187/32   # Jenkins
      - 195.69.175.192/32   # PXP Test Env
      - 184.69.72.190/32    # IdComply
      - 54.173.212.103/32   # IdComply
      - 128.0.169.65/32     # IdComply
      - 95.69.249.156/32    # IdComply
      - 27.65.195.158/32    # IdComply
      - 118.69.35.205/32    # IdComply
      - 113.161.91.174/32   # IdComply
    betgenius:
      - 212.250.151.148/32  # VPN: fw01-lon.argyll.tech
      - 212.250.151.149/32  # VPN: fw02-lon.argyll.tech
      - 178.23.129.249/32   # VPN: fw01-ghd.flipsports.net
      - 107.22.63.253/32    # VPN: twingate-phoenix-dev-connector-13
      - 34.206.153.88/32    # VPN: twingate-phoenix-dev-connector-14
      - 185.107.196.0/22
      - 54.72.77.116/32
      - 34.242.67.155/32
      - 34.242.6.161/32
      - 34.241.220.64/32
      - 52.19.163.53/32
      - 52.213.172.249/32
      - 52.214.86.245/32
      - 99.80.74.200/32
      - 54.76.226.75/32
      - 34.240.244.24/32
      - 34.252.158.247/32
      - 54.77.177.22/32
    pxp:
      - 195.69.175.192/32   # PXP Test Env
