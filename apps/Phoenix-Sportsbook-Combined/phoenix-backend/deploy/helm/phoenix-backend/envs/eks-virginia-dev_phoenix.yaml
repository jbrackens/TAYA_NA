      - 34.206.153.88/32    # VPN: twingate-phoenix-dev-connector-14


keycloak:
  namespace: keycloak
  realm: phoenix

podDisruptionBudget:
  enabled: true

postgresOperator:
  dbName: phoenix
  dbHost: phoenix-cluster.postgres-operator.svc.cluster.local
  dbWriterSecretName: phoenix-writer-user.phoenix-cluster.credentials.postgresql
  dbOwnerSecretName: phoenix-owner-user.phoenix-cluster.credentials.postgresql

prometheusRules:
  cluster: phoenix-dev-cluster
  env: dev

replicaCount: 3

resources:
  memory: "3Gi"


# Application

akka:
  persistence:
    jdbcPoolSize: 30
    recoveryTimeout: 600s

corsAllowedOrigins:
  - http://localhost:3000
  - https://dev-api.dev.phoenix.darkstormlabs.net  # Swagger
  - https://app.dev.phoenix.darkstormlabs.net
  - https://office.dev.phoenix.darkstormlabs.net

db:
  maxConnections: 30
  minConnections: 30
  slickThreadsNum: 30

markets:
  selectionOddsUpperBoundInclusive: 101
  # we want to show all markets on DEV - to diagnose issues
  marketTypesDisplayedToPunters: ""
  sportsDisplayedToPuntersByDefault: "s:p:1, s:p:2, s:p:3, s:p:10, s:p:11, s:p:12, s:p:13, s:p:15, s:p:16"
  tournamentsDisplayedToPuntersFilterEnabled: false

notifications:
  baseUrl: "https://app.dev.phoenix.darkstormlabs.net"
  customerSupportEmailAddress: "diana.georgieva@darkstormlabs.tech"
  email:
    enabled: true
    fromAddress: "virginia-dev@darkstormlabs.net"

openapi:
  docsRelativeUrl: "/docs"
  apiBaseUrl: "https://api.dev.phoenix.darkstormlabs.net"

punters:
  maximumAmountOfPunters: 100000
  mfa:
    enabledByDefault: true
    changeAllowed: false
    mandatoryForRegistration: true

reports:
  dge:
    dailyReportsSchedule: "mode=recurring,every=1.hour"
  aml:
    reportsRecipientEmailAddress: "diana.georgieva@darkstormlabs.tech"
    dailyReportsSchedule: "mode=recurring,every=1.hour"
    weeklyReportsSchedule: >-
      mode=daily,start-time=\"06:00\"
    monthlyReportsSchedule: >-
      mode=daily,start-time=\"06:00\"
    deceasedReportsSchedule: >-
      mode=weekly,day-of-week=WEDNESDAY,start-time=\"06:00\"
    manuallyUnsuspendedReportsSchedule: >-
      mode=weekly,day-of-week=TUESDAY,start-time=\"09:00\"
    multiDeviceActivityReportsSchedule: >-
      mode=daily,start-time=\"06:00\"

talon:
  talonAppBaseUrl: "https://office.dev.phoenix.darkstormlabs.net"


# 3rd party integrations

betgenius:
  dataIngestionEnabled: "no"
  apiEnvironment: "PRODPRM"

dge:
  sftp:
    host: argyll-s-srv01.flipsports.net
    port: 22
    rootDirectory: /virginia-dev
  exclusion:
    ingestion:
      schedule: "mode=recurring,every=1.hour"
      timeRestriction: 5.minutes
      maxRetries: 0

geoComply:
  licenseService:
    baseUrl: "https://stg-auth.geocomply.net"

idComply:
  baseUrl: "https://api.idcomply.net/v1"
  photoVerificationBaseUrl: "https://www.idcomply.net/demo-sdk/"
  frontEndRedirectionEndpoint: "https://app.dev.phoenix.darkstormlabs.net/esports-bets/idpv-result"
  idPhotoVerificationEndpoint: "kyc-esports-nj-ocr"
  endpointPaths:
    knowYourCustomer: "/kyc-esports-nj"
    knowledgeBasedAuthentication: "/kyc-esports-nj-kba"

oddin:
  dataIngestionEnabled: "yes"
  useCommonDataApiModel: "yes"
  environment: INTEGRATION
  restBaseUrl: "https://api-mq.integration.oddin.gg"
  nodeId: "1"
  kafka:
    enabled: "no"
    consumer:
      bootstrapServers: "phoenix-strimzi-kafka-bootstrap.cloudflow:9092"

payments:
  baseUrl: "https://api.test.kalixa.com"

twilio:
  verifyApiBaseUrl: "https://verify.twilio.com"
