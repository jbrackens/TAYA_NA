name: Promote Overlay Images

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target overlay environment
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: Image tag to apply across the overlay
        required: true
        type: string

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Promote overlay image tags
        run: ./scripts/release/promote_overlay_tags.sh "${{ inputs.environment }}" "${{ inputs.image_tag }}"

      - name: Validate overlays
        run: ./scripts/validate_k8s_overlays.sh

      - name: Commit overlay tag update
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "deploy/k8s/overlays/${{ inputs.environment }}/kustomization.yaml"
          git commit -m "chore(release): promote ${{ inputs.environment }} images to ${{ inputs.image_tag }}"
          git push
