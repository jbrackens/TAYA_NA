name: Platform Verify

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "deploy/**"
      - "docs/**"
      - "phoenix-*/**"
      - "stella-engagement/**"
      - "scripts/**"
      - ".env.dev"
      - ".env.production.example"
      - "docker-compose.yml"
      - "README.md"
      - "IMPLEMENTATION_STATUS.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "deploy/**"
      - "docs/**"
      - "phoenix-*/**"
      - "stella-engagement/**"
      - "scripts/**"
      - ".env.dev"
      - ".env.production.example"
      - "docker-compose.yml"
      - "README.md"
      - "IMPLEMENTATION_STATUS.md"
  workflow_dispatch:

jobs:
  overlay-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Validate overlays
        run: ./scripts/validate_k8s_overlays.sh

  docker-build-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker builds
        run: ./scripts/verify_docker_builds.sh

  compose-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run compose-backed integration
        run: ./phoenix-gateway/scripts/run_compose_integration.sh
