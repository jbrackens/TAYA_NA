name: Publish Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        type: string
  push:
    tags:
      - "release-*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: phoenix-gateway
            context: ./phoenix-gateway
            dockerfile: ./phoenix-gateway/Dockerfile
          - image: phoenix-user
            context: ./phoenix-user
            dockerfile: ./phoenix-user/Dockerfile
          - image: phoenix-wallet
            context: .
            dockerfile: ./phoenix-wallet/Dockerfile
          - image: phoenix-market-engine
            context: ./phoenix-market-engine
            dockerfile: ./phoenix-market-engine/Dockerfile
          - image: phoenix-betting-engine
            context: .
            dockerfile: ./phoenix-betting-engine/Dockerfile
          - image: phoenix-events
            context: .
            dockerfile: ./phoenix-events/Dockerfile
          - image: phoenix-retention
            context: .
            dockerfile: ./phoenix-retention/Dockerfile
          - image: phoenix-social
            context: .
            dockerfile: ./phoenix-social/Dockerfile
          - image: phoenix-compliance
            context: .
            dockerfile: ./phoenix-compliance/Dockerfile
          - image: phoenix-analytics
            context: .
            dockerfile: ./phoenix-analytics/Dockerfile
          - image: phoenix-settlement
            context: .
            dockerfile: ./phoenix-settlement/Dockerfile
          - image: phoenix-notification
            context: .
            dockerfile: ./phoenix-notification/Dockerfile
          - image: phoenix-cms
            context: .
            dockerfile: ./phoenix-cms/Dockerfile
          - image: stella-engagement
            context: .
            dockerfile: ./stella-engagement/Dockerfile
          - image: phoenix-outbox-worker
            context: ./phoenix-common
            dockerfile: ./phoenix-common/Dockerfile.outbox-worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/philcali-phoenix/${{ matrix.image }}:${{ steps.meta.outputs.tag }}
