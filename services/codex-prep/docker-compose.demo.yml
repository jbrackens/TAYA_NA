      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    ports:
      - "8015:8015"
    networks:
      - phoenix-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/8015) 2>/dev/null' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------- Support Notes Service ----------
  phoenix-support-notes:
    build:
      context: .
      dockerfile: phoenix-support-notes/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    ports:
      - "8016:8016"
    networks:
      - phoenix-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/8016) 2>/dev/null' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------- Config Service ----------
  phoenix-config:
    build:
      context: .
      dockerfile: phoenix-config/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
    ports:
      - "8017:8017"
    networks:
      - phoenix-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c '(echo > /dev/tcp/localhost/8017) 2>/dev/null' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------- Outbox Worker ----------
  phoenix-outbox-worker:
    build:
      context: ./phoenix-common
      dockerfile: Dockerfile.outbox-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE}
    networks:
      - phoenix-net
    restart: unless-stopped

secrets:
  npmrc:
    file: ${HOME}/.npmrc
