# =============================================================================
# Phoenix Platform — Full Demo Stack
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml --env-file .env.demo up -d
#
# This overlay adds the full Phoenix backend plus the real player frontend and
# Talon backoffice on top of the infrastructure
# defined in docker-compose.yml (postgres, redis, kafka, kafka-init, kafka-ui).
#
# Single-machine demo only. Not for production.
# =============================================================================

services:

  # ---------- migrate: run all SQL migrations before services start ----------
  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${DB_NAME}
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "==> Running migrations (UP sections only)..."
        for f in /migrations/*.sql; do
          echo "  applying $$(basename $$f)"
          if grep -q '^-- Up$$' "$$f"; then
            sed -n '/^-- Up$$/,/^-- Down$$/{ /^-- Down$$/d; /^-- Up$$/d; p; }' "$$f" | psql -v ON_ERROR_STOP=1
          else
            psql -v ON_ERROR_STOP=1 -f "$$f"
          fi
        done
        echo "==> Migrations complete."
    networks:
      - phoenix-net
    restart: "no"

  # ---------- API Gateway ----------
  phoenix-gateway:
    build:
      context: ./phoenix-gateway
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      LOG_LEVEL: ${LOG_LEVEL}
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      PHOENIX_USER_URL: ${PHOENIX_USER_URL}
      PHOENIX_WALLET_URL: ${PHOENIX_WALLET_URL}
      PHOENIX_MARKET_ENGINE_URL: ${PHOENIX_MARKET_ENGINE_URL}
      PHOENIX_BETTING_ENGINE_URL: ${PHOENIX_BETTING_ENGINE_URL}
      PHOENIX_EVENTS_URL: ${PHOENIX_EVENTS_URL}
      PHOENIX_RETENTION_URL: ${PHOENIX_RETENTION_URL}
      PHOENIX_SOCIAL_URL: ${PHOENIX_SOCIAL_URL}
      PHOENIX_COMPLIANCE_URL: ${PHOENIX_COMPLIANCE_URL}
      PHOENIX_ANALYTICS_URL: ${PHOENIX_ANALYTICS_URL}
      PHOENIX_SETTLEMENT_URL: ${PHOENIX_SETTLEMENT_URL}
      PHOENIX_NOTIFICATION_URL: ${PHOENIX_NOTIFICATION_URL}
      PHOENIX_CMS_URL: ${PHOENIX_CMS_URL}
      STELLA_ENGAGEMENT_URL: ${STELLA_ENGAGEMENT_URL}
      PHOENIX_PREDICTION_URL: ${PHOENIX_PREDICTION_URL}
      PHOENIX_AUDIT_URL: ${PHOENIX_AUDIT_URL}
      PHOENIX_SUPPORT_NOTES_URL: ${PHOENIX_SUPPORT_NOTES_URL}
      PHOENIX_CONFIG_URL: ${PHOENIX_CONFIG_URL}
      PHOENIX_REALTIME_URL: ${PHOENIX_REALTIME_URL}
      HTTP_ALLOWED_ORIGINS: ${HTTP_ALLOWED_ORIGINS}
      WEBSOCKET_ALLOWED_ORIGINS: ${WEBSOCKET_ALLOWED_ORIGINS}
      WEBSOCKET_REALTIME_PROXY_ENABLED: ${WEBSOCKET_REALTIME_PROXY_ENABLED}
    ports:
      - "8080:8080"
    networks:
      - phoenix-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

