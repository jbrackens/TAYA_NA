apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phoenix-gateway
  template:
    metadata:
      labels:
        app: phoenix-gateway
    spec:
      containers:
        - name: phoenix-gateway
          image: ghcr.io/philcali-phoenix/phoenix-gateway:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: phoenix-platform-config
            - secretRef:
                name: phoenix-platform-secrets
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix-gateway
spec:
  selector:
    app: phoenix-gateway
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
---
