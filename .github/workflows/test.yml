name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Workspace root — yarn workspaces are declared here and yarn.lock
        # lives here. Installing from a sub-package via npm causes hour-long
        # resolution loops because the workspace root isn't detected.
        working-directory: apps/Phoenix-Predict-Combined/talon-backoffice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: apps/Phoenix-Predict-Combined/talon-backoffice/yarn.lock

      - name: Install dependencies (workspace root)
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        # Top-level tests only. Integration tests live in __tests__/integration/
        # and need a running gateway; they run in a separate workflow.
        working-directory: apps/Phoenix-Predict-Combined/talon-backoffice/packages/app
        run: npx tsx --test --test-reporter=tap app/__tests__/*.test.ts

  go-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build platform
        working-directory: apps/Phoenix-Predict-Combined/go-platform/modules/platform
        run: go build ./...

      - name: Test platform
        working-directory: apps/Phoenix-Predict-Combined/go-platform/modules/platform
        run: go test -race -count=1 ./...

      - name: Build gateway
        working-directory: apps/Phoenix-Predict-Combined/go-platform/services/gateway
        run: go build ./...

      - name: Test gateway
        working-directory: apps/Phoenix-Predict-Combined/go-platform/services/gateway
        run: go test -race -count=1 ./...

      - name: Build auth
        working-directory: apps/Phoenix-Predict-Combined/go-platform/services/auth
        run: go build ./...

      - name: Test auth
        working-directory: apps/Phoenix-Predict-Combined/go-platform/services/auth
        run: go test -race -count=1 ./...
