sbTech {
  kafka {
    bootstrap = "localhost:9092"
    bootstrap = ${?GMX_KAFKA_BOOTSTRAP}
    offset-config = "earliest"
  }
  source-topics {
    selections = "gmx-messaging.%s-sd-external-operator-selections"
    markets = "gmx-messaging.%s-sd-external-operator-markets"
    events = "gmx-messaging.%s-sd-external-operator-events"
    schema-registry = "http://schema-registry.gmx.prod.internal:8081"
    schema-registry = ${?GMX_KAFKA_SCHEMA_REGISTRY_URL}
  }
  target-topics {
    odds = "gmx-messaging.%s-site-extensions-sportevents%s"
    schema-registry = "http://schema-registry.gmx.prod.internal:8081"
    schema-registry = ${?GMX_KAFKA_SCHEMA_REGISTRY_URL}
  }
}

include "dev.conf"