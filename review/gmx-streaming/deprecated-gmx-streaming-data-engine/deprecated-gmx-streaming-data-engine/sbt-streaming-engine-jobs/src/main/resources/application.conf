sbTech {
  kafka {
    bootstrap = "localhost:9092"
    bootstrap = ${?GMX_KAFKA_BOOTSTRAP}
    offset-config = "earliest"
    schemar-registry = "http://datastream-schema.sbtech.info"
  }
  kafka-topics {
    casino-bets = "casinobets"
    customer-details = "customerdetails"
    sport-bets-info = "sportbets"
    wallet-transaction = "wallettransaction"
    customer-deposit = "customerdeposit"
    topics-prefix = "ds"
  }
  target-topics {
    gmx-messaging = "gmx-messaging"
    gmx-tracking = "gmx-tracking"
    rewards-point-topic = "reward-points-topup"
    customer-upsert-topic = "customer-upsert"
    bets-filtered = "sbtech-bets-filtered"
  }
  schema-registry = "http://datastream-schema.sbtech.info"
  use-registry = true
  use-registry = ${?USE_REGISTRY}
  sources {
    sportnation = {
      id = 154,
      uuid = "9577609b-d14f-4f14-ae6d-a6de017e8254",
      name = "sportnation"
    }
    redzone = {
      id = 155,
      uuid = "7b4b7e86-d9df-44e0-9170-dbfdd5a176fa",
      name = "redzone"
    }
  }
  checkpoints = "/data/checkpoints"
  checkpoints = ${?CHECKPOINTS}
}

include "dev.conf"