kind: Application
apiVersion: argoproj.io/v1alpha1
metadata:
  name: phoenix-elastic
spec:
  destination:
    namespace: elastic
  source:
    repoURL: 'git@github.com:flipadmin/phoenix-backend.git'
    path: deploy/helm/phoenix-elastic
    targetRevision: develop
    helm:
      valueFiles:
        - values.yaml
        - envs/eks-virginia-dev_elastic.yaml
