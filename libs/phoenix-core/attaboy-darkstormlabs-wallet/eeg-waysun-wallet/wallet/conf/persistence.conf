jdbc-journal {
  use-shared-db = "slick"
}

# the akka-persistence-snapshot-store in use
jdbc-snapshot-store {
  use-shared-db = "slick"
}

# the akka-persistence-query provider in use
jdbc-read-journal {
  use-shared-db = "slick"
}

akka-persistence-jdbc {
  shared-databases {
    slick = ${slick}
  }
}

slick {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    name = "wallet"
    name = ${?WALLET_DB_NAME}
    host = "localhost"
    host = ${?WALLET_DB_ADDRESS}
    port = 5432
    port = ${?WALLET_DB_PORT}
    url = "jdbc:postgresql://"${slick.db.host}":"${slick.db.port}"/"${slick.db.name}"?reWriteBatchedInserts=true"
    user = "wallet"
    user = ${?WALLET_DB_USERNAME}
    password = "wallet"
    password = ${?WALLET_DB_PASSWORD}
    driver = "org.postgresql.Driver"
    numThreads = 5
    numThreads = ${?WALLET_DB_NUM_THREADS}
    maxConnections = 5
    maxConnections = ${?WALLET_DB_MAX_CONNECTIONS}
    minConnections = 5
    minConnections = ${?WALLET_DB_MIN_CONNECTIONS}
  }
}

transaction-read {
  slick {
    profile = "slick.jdbc.PostgresProfile$"
    db {
      name = "wallet"
      name = ${?WALLET_TRANSACTION_READ_DB_NAME}
      host = "localhost"
      host = ${?WALLET_TRANSACTION_READ_DB_ADDRESS}
      port = 5432
      port = ${?WALLET_TRANSACTION_READ_DB_PORT}
      url = "jdbc:postgresql://"${transaction-read.slick.db.host}":"${transaction-read.slick.db.port}"/"${transaction-read.slick.db.name}"?reWriteBatchedInserts=true"
      user = "wallet"
      user = ${?WALLET_TRANSACTION_READ_DB_USERNAME}
      password = "wallet"
      password = ${?WALLET_TRANSACTION_READ_DB_PASSWORD}
      driver = "org.postgresql.Driver"
      numThreads = 5
      numThreads = ${?WALLET_TRANSACTION_READ_DB_NUM_THREADS}
      maxConnections = 5
      maxConnections = ${?WALLET_TRANSACTION_READ_DB_MAX_CONNECTIONS}
      minConnections = 5
      minConnections = ${?WALLET_TRANSACTION_READ_DB_MIN_CONNECTIONS}
    }
  }
}

akka.projection.jdbc {
  dialect = postgres-dialect
  blocking-jdbc-dispatcher {
    thread-pool-executor {
      fixed-pool-size = 5
    }
  }

  offset-store {
    # set this to your database schema if applicable, empty by default
    schema = ""
    # the database table name for the offset store
    table = "akka_projection_offset_store"
  }
}
