# Note that there is NO phoenix-ui-app (Core App) deployment anywhere in the existing k8s clusters
# instead, a Brand App is deployed.
image:
  name: phoenix-ui-office

apiGlobalEndpoint: "https://api.stg.phoenix.viegg.net"
cdnUrl: "https://cdn.vie.gg/phoenix/static"
envName: development
showForSubmission: 0
wsGlobalEndpoint: "wss://ws-api.stg.phoenix.viegg.net/web-socket"
geocomply:
  env: "staging"
  mobileServiceUrl: "https://stg-es.geocomply.net/oobee.php"
  oobeeUrl: "https://nj-stg-oobee.geocomply.net"

imagePullSecrets: [ecr-docker-credentials]

ingress:
  host: office.stg.phoenix.viegg.net

  alb:
    group: "phoenix-frontends"
    customerOwnedIP:
      enabled: true
      ipv4poolCoip: ipv4pool-coip-01cdf968d7c5e4718
      outpostPublicSubnetID: subnet-081324184b4896954

  whitelistedIps: []
