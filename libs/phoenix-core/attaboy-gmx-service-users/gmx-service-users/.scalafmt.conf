version = "2.5.0"

style = defaultWithAlign

align.preset                        = more
align.openParenCallSite             = true
align.openParenDefnSite             = true
continuationIndent.extendSite       = 2
continuationIndent.withSiteRelativeToExtends = 4
rewrite.rules                       = [AvoidInfix,RedundantBraces,RedundantParens,SortImports]
danglingParentheses.preset          = true
docstrings                          = JavaDoc
maxColumn                           = 140
unindentTopLevelOperators           = true
rewrite.neverInfix.excludeFilters   = [
  and
  min
  max
  until
  to
  by
  eq
  ne
  "should.*"
  "contain.*"
  "must.*"
  in
  ignore
  be
  taggedAs
  thrownBy
  synchronized
  have
  when
  size
  only
  noneOf
  oneElementOf
  noElementsOf
  atLeastOneElementOf
  atMostOneElementOf
  allElementsOf
  inOrderElementsOf
  theSameElementsAs
]
rewriteTokens = {
  "⇒": "=>"
  "→": "->"
  "←": "<-"
}
spaces.inImportCurlyBraces          = true
spaces.beforeContextBoundColon      = IfMultipleBounds
verticalMultiline.arityThreshold    = 2
verticalMultiline.atDefnSite        = true
