include "application.base"

#
#
akka {

  management.cluster.bootstrap.contact-point-discovery {
    discovery-method = kubernetes-api
    service-name = "gmx-user-service"
    required-contact-point-nr = ${REQUIRED_CONTACT_POINT_NR}
  }

  discovery.kubernetes-api.pod-label-selector="app.kubernetes.io/name=%s"
}

lagom {
  # exit jvm on actor system termination
  # this will allow Kubernetes to restart the pod
  cluster.exit-jvm-when-system-terminated = on
}