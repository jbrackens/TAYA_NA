#
#
akka {

  actor.serialization-bindings {
    # commands won't use play-json but Akka's jackson support
    "gmx.users.internal.aggregate.UserCommandSerializable" = jackson-json
  }
}

play {

  application.loader = gmx.users.internal.UserLoader

  http {
    secret.key = "changeme"
    secret.key = ${?APPLICATION_SECRET}
  }

  server {
    pidfile.path = "/dev/null"
  }
}

lagom {
  # exit jvm on actor system termination
  # this will allow Kubernetes to restart the pod
  cluster.exit-jvm-when-system-terminated = on

  # Default to NOT allowing table creation
  # This way we're less likely to fuck up in production
  persistence.jdbc.create-tables.auto = false
}

db.default {
  driver = "org.postgresql.Driver"
  url = "jdbc:postgresql://localhost:5432/user_service"
  url = ${?DATABASE_URL}
  username = user_service
  username = ${?DATABASE_USERNAME}
  password = "user_service"
  password = ${?DATABASE_PASSWORD}
}

jdbc-defaults.slick.profile = "slick.jdbc.PostgresProfile$"

sbtech-processor = {
  bootstrap-servers = "localhost:9092"
  bootstrap-servers = ${?KAFKA_SERVICE_NAME}
  use-registry = true
  schema-registry-url = "http://localhost:8081"
  schema-registry-url = ${?SCHEMA_REGISTRY_URL}
  group = "gmx-messaging.user-service-consumer"
  ask-timeout = 10s
  //TODO use shared library with constants or exposed API in OIDC | https://flipsports.atlassian.net/browse/GMV3-258
  brand-id = "9577609b-d14f-4f14-ae6d-a6de017e8254"
}

user-service {

  login-processor = ${sbtech-processor} {
    //TODO add basic support for multiple brands | https://flipsports.atlassian.net/browse/GMV3-349
    topics = ["gmx-messaging.sportnation-ds-logins"]
  }

  customer-detail-processor = ${sbtech-processor} {
    topics = ["gmx-messaging.sportnation-ds-customerdetails"]
  }

  wallet-transaction-processor = ${sbtech-processor} {
    topics = ["gmx-messaging.sportnation-ds-wallettransactions"]
  }

  casino-bet-processor = ${sbtech-processor} {
    topics = ["gmx-messaging.sportnation-ds-casinobets"]
  }

  sport-bet-processor = ${sbtech-processor} {
    topics = ["gmx-messaging.sportnation-ds-sportbets"]
  }
}
