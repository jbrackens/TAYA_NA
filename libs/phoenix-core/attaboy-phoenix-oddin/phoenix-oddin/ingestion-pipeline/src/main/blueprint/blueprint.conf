phoenix.streamlets.package = "phoenix.oddin.streamlets"

blueprint {
  streamlets {
    oddin-ingestor = ${phoenix.streamlets.package}.OddinMessageIngestor
    oddin-parser = ${phoenix.streamlets.package}.OddinMessageParser
    create-market-commands = ${phoenix.streamlets.package}.CreatePhoenixCommands
    odds-change-console-output = ${phoenix.streamlets.package}.OddsChangeConsoleOutput
    fixture-change-console-output = ${phoenix.streamlets.package}.FixtureChangeConsoleOutput
    unparsable-message-console-output = ${phoenix.streamlets.package}.UnparsableMessageHandler
  }
  topics {
    oddin-messages {
      producers = [oddin-ingestor.out]
      consumers = [oddin-parser.in]
    }
    oddin-odds-changes {
      producers = [oddin-parser.odds-changes]
      consumers = [create-market-commands.in]
    }
    oddin-fixture-changes {
      producers = [oddin-parser.fixture-changes]
      consumers = [fixture-change-console-output.in]
    }
    oddin-unparsable-messages {
      producers = [oddin-parser.unparsable-messages]
      consumers = [unparsable-message-console-output.in]
    }
    oddin-phoenix-commands {
      producers = [create-market-commands.out]
      consumers = [odds-change-console-output.in]
    }
  }
}
