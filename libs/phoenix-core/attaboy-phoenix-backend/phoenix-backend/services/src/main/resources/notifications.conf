phoenix {
  notifications {
    # Base url used in links injected into emails (account activation, reset password, etc.)
    base-url = "http://localhost:3000"
    base-url = ${?EMAIL_NOTIFICATIONS_BASE_URL}
    talon-app-base-url = "http://localhost:3001"
    talon-app-base-url = ${?TALON_APP_BASE_URL}
    customer-support-email = "blackhole@sink.sendgrid.net"
    customer-support-email = ${?CUSTOMER_SUPPORT_EMAIL_ADDRESS}
    email {
      # Toggle on/off read-side notifications
      enabled = false
      enabled = ${?EMAIL_NOTIFICATIONS_ENABLED}
      from-address = "noreply@phoenix.localhost.com"
      from-address = ${?EMAIL_NOTIFICATIONS_FROM_ADDRESS}
      sendgrid {
        api-key = "secret-key"
        api-key = ${?EMAIL_NOTIFICATIONS_SENDGRID_API_KEY}
      }
    }
  }
}
