include "dge"

phoenix {
  punters {
    domain {
      maximum-amount-of-punters = 1000 # Set it from environment
      maximum-amount-of-punters = ${?MAXIMUM_AMOUNT_OF_PUNTERS}
      mfa {
        enabled-by-default = true
        enabled-by-default = ${?MFA_ENABLED_BY_DEFAULT}
        change-allowed = false
        change-allowed = ${?MFA_CHANGE_ALLOWED}
        mandatory-for-registration = false
        mandatory-for-registration = ${?MFA_MANDATORY_FOR_REGISTRATION}
      }
    }
    projections {
      punter-cool-off.name = "punter-cool-off"
      punter-notifications.name = "punter-notifications"
      wallet-notifications.name = "wallet-notifications"
      session-limits.name = "session-limits"
      limits-history.name = "limits-history"
      cool-offs-history.name = "cool-offs-history"
      self-excluded-punters.name = "self-excluded-punters"
      punter-status.name = "punter-status"
    }
    cool-off {
      periodic-worker {
        name = "cool-off-periodic-worker"
        schedule = "mode=recurring,every=1.minute"
        time-restriction = 1.minute
        max-retries = 0
      }
    }
    session-limits {
      periodic-worker {
        name = "session-limits-periodic-worker"
        schedule = "mode=recurring,every=1.minute"
        time-restriction = 1.minute
        max-retries = 0
      }
    }
    excluded-users {
      sftp = ${dge.sftp}

      excluded-users-ingestion {
        ingestion-file = "DGE_ExcList.xml"
        directory = "Exclusion/Incoming"
        periodic-worker {
          name = "excluded-user-ingestion-worker"
          schedule = "mode=daily,start-time=\"12:00\""
          schedule = ${?PHOENIX_DGE_EXCLUSION_INGESTION_SCHEDULE}
          time-restriction = 5.minutes
          time-restriction = ${?PHOENIX_DGE_EXCLUSION_INGESTION_TIME_RESTRICTION}
          max-retries = 0
          max-retries = ${?PHOENIX_DGE_EXCLUSION_INGESTION_MAX_RETRIES}
        }
      }
      excluded-users-report {
        skin-id = "01"
        license-id = "86-"${phoenix.punters.excluded-users.excluded-users-report.skin-id}
        report-file = "OPR_ExcList_"${phoenix.punters.excluded-users.excluded-users-report.license-id}".xml"
        periodic-worker {
          name = "excluded-user-report-worker"
          schedule = "mode=daily,start-time=\"04:00\""
          time-restriction = 5.minutes
          max-retries = 0
        }
        directory = "Exclusion/Outgoing"
      }
    }
    bets-emitter {
      queue-buffer-size = 128
      broadcaster-buffer-size = 128
      slow-consumer-timeout = 5s
    }
    ssn-encryption-password = "[i-should-be-set-from-env]"
    ssn-encryption-password = ${?SSN_ENCRYPTION_PASSWORD}
  }
}
