include "application-base"

akka.actor.provider = cluster

akka.actor.serialize-messages = on

akka.cluster.jmx.multi-mbeans-in-same-jvm = on
akka.cluster.roles = [bets, markets, wallets, punters]
akka.cluster.seed-nodes = []

akka.remote.artery.canonical.port = 0


jdbc-read-journal.journal-sequence-retrieval.query-delay = "100ms"
jdbc-read-journal.refresh-interval = "100ms"


phoenix.markets.oddin-feed-enabled = false

phoenix.oddin.api-config.access-token = "foo-bar"
phoenix.oddin.api-config.node-id = "1"

phoenix.punters.cool-off.periodic-worker.initial-delay = 10.millis
phoenix.punters.cool-off.periodic-worker.interval = 100.millis

phoenix.punters.session-limits.periodic-worker.initial-delay = 10.millis
phoenix.punters.session-limits.periodic-worker.interval = 100.millis

slick {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    name = "backend"
    name = ${?POSTGRES_DB}
    host = "localhost"
    host = ${?POSTGRES_HOST}
    port = 5432
    port = ${?POSTGRES_PORT}
    url = "jdbc:postgresql://"${slick.db.host}":"${slick.db.port}"/"${slick.db.name}"?reWriteBatchedInserts=true"
    user = "backend"
    user = ${?POSTGRES_USER}
    password = "backend"
    password = ${?POSTGRES_PASSWORD}
    driver = "org.postgresql.Driver"
    numThreads = 5
    maxConnections = 5
    minConnections = 5
  }
}


slick.db.url = "jdbc:postgresql://"${slick.db.host}":"${slick.db.port}"/"${slick.db.name}"?reWriteBatchedInserts=true"
