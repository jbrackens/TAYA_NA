kind: ConfigMap
apiVersion: v1
metadata:
  name: setup-elk
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "900"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
data:
  {{ (.Files.Glob "scripts/setup_elk.sh").AsConfig | nindent 2 }}
