kind: ServiceAccount
apiVersion: v1
metadata:
  name: {{ include "phoenix-backend.serviceAccountName" . }}
  labels:
    {{- include "phoenix-backend.labels" . | nindent 4 }}

---

kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: pod-reader
rules:
  # This is required by akka.discovery.kubernetes.KubernetesApiServiceDiscovery
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, watch, list]

---

kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: read-pods
subjects:
  - kind: ServiceAccount
    name: {{ include "phoenix-backend.serviceAccountName" . }}
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
