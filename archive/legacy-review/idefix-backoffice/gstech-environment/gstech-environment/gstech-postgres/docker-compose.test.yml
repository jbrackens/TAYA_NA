version: '3'

services:
  gstech-postgres.test:
    build:
      context: .
      dockerfile: Dockerfile
    image: gstech-postgres.test
    container_name: gstech-postgres.test
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_USER: root
    command: "postgres -c fsync=off -c full_page_writes=off -c synchronous_commit=OFF"
    networks:
      - gstech

networks:
  gstech:
    external: true
