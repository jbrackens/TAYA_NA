version: '3'

services:
  gstech-zookeeper:
    container_name: gstech-zookeeper
    image: wurstmeister/zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
    - "2181:2181"

  gstech-kafka:
    container_name: gstech-kafka
    image: wurstmeister/kafka:2.12-2.2.1
    environment:
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://gstech-kafka:19092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_ZOOKEEPER_CONNECT: gstech-zookeeper:2181
      KAFKA_CREATE_TOPICS: "topic1:1:1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
    ports:
    - 9092:9092
    depends_on:
    - gstech-zookeeper
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock

  gstech-kafka-manager:
    image: sheepkiller/kafka-manager:latest
    ports:
      - 9011:9000
    links:
      - gstech-zookeeper
      - gstech-kafka
    environment:
      ZK_HOSTS: gstech-zookeeper:2181
      APPLICATION_SECRET: letmein
      KM_ARGS: -Djava.net.preferIPv4Stack=true

  gstech-kafdrop:
    image: obsidiandynamics/kafdrop
    restart: "no"
    ports:
      - 9012:9000
    environment:
      KAFKA_BROKERCONNECT: "gstech-kafka:19092"
      JVM_OPTS: "-Xms16M -Xmx48M -Xss180K -XX:-TieredCompilation -XX:+UseStringDeduplication -noverify"
    depends_on:
      - gstech-kafka
