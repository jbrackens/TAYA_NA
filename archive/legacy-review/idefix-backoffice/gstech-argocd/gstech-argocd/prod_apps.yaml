apiVersion: argoproj.io/v1alpha1
kind: Application
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    path: prod/
    repoURL: git@github.com:LuckyDino/gstech-argocd.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
metadata:
  name: prod-gstech-apps
  namespace: argocd
