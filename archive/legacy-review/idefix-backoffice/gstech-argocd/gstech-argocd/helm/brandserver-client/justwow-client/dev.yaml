nameOverride: "dev-justwow-client-service"
fullnameOverride: "dev-justwow-client-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

resources:
  requests:
    memory: "1.5Gi"
  limits:
    memory: "1.5Gi"

service:
  enabled: true
  type: ClusterIP
  port: 3000

ingress:
  enabled: false

env:
  SITE_NAME: kalevala
  NODE_ENV: production
  PORT: 3000
  API: http://dev-justwow-backend-service:3000
  CAPTCHA_KEY: "6LceU1clAAAAABoM_YhnXjOlPMANc-H8AXAFnN5L"
