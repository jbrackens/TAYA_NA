livenessProbe:
  path: /api/v1/status
  port: 3000
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 10

readinessProbe:
  path: /api/v1/status
  port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 10

image:
  repository: 743851384875.dkr.ecr.eu-central-1.amazonaws.com/brandserver-client
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

serviceAccount:
  create: false
  annotations: {}
  name: ""

podSecurityContext: {}

securityContext: {}

resources:
  requests:
    memory: "1Gi"
    cpu: "100m"
  limits:
    memory: "1Gi"

nodeSelector: {}

tolerations: []

affinity: {}

# Container
containerPort: 3000

prometheus:
  enabled: true
  path: /metrics
  interval: 40s
  portname: metrics
