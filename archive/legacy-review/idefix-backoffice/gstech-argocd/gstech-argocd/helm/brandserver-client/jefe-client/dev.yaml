nameOverride: "dev-jefe-client-service"
fullnameOverride: "dev-jefe-client-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

resources:
  requests:
    memory: "1.5Gi"
  limits:
    memory: "1.5Gi"

service:
  enabled: true
  type: ClusterIP
  port: 3000

ingress:
  enabled: false

env:
  SITE_NAME: jefe
  NODE_ENV: production
  PORT: 3000
  API: http://dev-jefe-backend-service:3000
  CAPTCHA_KEY: "6Le1TlclAAAAABXk01N2E59qE1QQy5w7Y5m-KkWc"
