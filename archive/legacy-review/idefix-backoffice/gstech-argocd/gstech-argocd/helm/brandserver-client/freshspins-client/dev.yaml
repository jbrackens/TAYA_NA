nameOverride: "dev-freshspins-client-service"
fullnameOverride: "dev-freshspins-client-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

service:
  enabled: true
  type: ClusterIP
  port: 3000

resources:
  requests:
    memory: "1.5Gi"
  limits:
    memory: "1.5Gi"

ingress:
  enabled: false
  paths:
    - path: /*
      backend:
        serviceName: dev-freshspins-client-service
        servicePort: 3000

  name: alb-ingress-dev-freshspins-client-service
  namespace: dev
  annotations: {}

  hosts: []
  tls: []

env:
  SITE_NAME: sportnation
  NODE_ENV: production
  PORT: 3000
  API: http://dev-freshspins-backend-service:3000
  CAPTCHA_KEY: "6LeJVVclAAAAAC2j-iosA3qiJ0kf0E0pT1qhfTwG"
