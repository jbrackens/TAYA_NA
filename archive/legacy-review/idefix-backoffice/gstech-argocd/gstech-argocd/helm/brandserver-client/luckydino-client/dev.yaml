nameOverride: "dev-luckydino-client-service"
fullnameOverride: "dev-luckydino-client-service"

replicaCount: 1

# command: "yarn dev:luckydino"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

resources:
  requests:
    memory: "1.5Gi"
  limits:
    memory: "1.5Gi"

service:
  enabled: true
  type: ClusterIP
  port: 3000

ingress:
  enabled: false

env:
  SITE_NAME: luckydino
  NODE_ENV: production
  PORT: 3000
  API: http://dev-luckydino-backend-service:3000
  CAPTCHA_KEY: "6Lc73VUlAAAAANEiKFP0FnP6Q0snYIVlLlaQtghX"
