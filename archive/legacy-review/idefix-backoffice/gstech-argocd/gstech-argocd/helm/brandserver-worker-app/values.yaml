replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  iam.amazonaws.com/role: "iam-role-goes-here"

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  metricsPort: 4001

ingress:
  enabled: false
  annotations: {}

  hosts:
    - host: chart-example.local
      paths: []
  tls: []

resources: {}

verticalAutoscaler:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

minAvailable: 1

nodeSelector: {}

tolerations: []

rbac:
  create: false

podSecurityPolicy:
  create: false

livenessProbe:
  exec:
    command:
    - ps
  initialDelaySeconds: 40
  periodSeconds: 20
  timeoutSeconds: 20

readinessProbe:
  exec:
    command:
    - ps
  initialDelaySeconds: 40
  periodSeconds: 20
  timeoutSeconds: 20

secretEnv: []
