{{- if and (.Values.ingress.enabled) (.Values.ingress.private) }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: {{ .Release.Namespace | quote }}
  labels:
    "app.kubernetes.io/name": '{{ template "luckydino-app.name" .}}'
    {{- if .Values.renderHelmLabels }}
    "helm.sh/chart": "{{ .Chart.Name }}-{{ .Chart.Version }}"
    {{- end }}
    "app.kubernetes.io/managed-by": "{{ .Release.Service }}"
    "app.kubernetes.io/instance": "{{ .Release.Name }}"
    "app.kubernetes.io/component": "{{ .Values.ingress.componentName }}"
{{- if .Values.ingress.labels }}
{{ toYaml .Values.ingress.labels | indent 4 }}
{{- end }}
{{- if .Values.ingress.private.annotations }}
  annotations:
{{ toYaml .Values.ingress.private.annotations | indent 4 }}
{{- end }}
  name: {{ template "luckydino-app.fullname" . }}-private
spec:
  {{- if .Values.ingressClassName }}
  ingressClassName: {{ .Values.ingressClassName | quote }}
  {{- end }}
  rules:
    {{- range .Values.ingress.private.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  number: {{ .servicePort }}
          {{- end }}
    {{- end }}
{{- end }}
