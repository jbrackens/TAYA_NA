nameOverride: "dev-gstech-backoffice-service"
fullnameOverride: "dev-gstech-backoffice-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

service:
  enabled: true
  type: ClusterIP
  port: 5000

ingress:
  enabled: false

env:
  NODE_ENV: development

secretEnv:
  REACT_APP_GOOGLE_CLIENT_ID:
    dev-gstech-client-service: google-client-id
