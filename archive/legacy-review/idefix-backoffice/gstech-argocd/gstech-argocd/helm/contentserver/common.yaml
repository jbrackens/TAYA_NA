livenessProbe:
  httpGet:
    path: /api/v1/status
    port: 3016
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 10

readinessProbe:
  httpGet:
    path: /api/v1/status
    port: 3016
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 10

image:
  repository: 743851384875.dkr.ecr.eu-central-1.amazonaws.com/gstech-contentserver
  pullPolicy: Always
  tag: "latest"

command: >-
  yarn migrate &&
  yarn workspace gstech-contentserver serve

imagePullSecrets: []

serviceAccount:
  create: false
  annotations: {}
  name: ""

podSecurityContext: {}

securityContext: {}

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1024Mi"

nodeSelector: {}

tolerations: []

affinity: {}

containerPort: 3016

prometheus:
  enabled: true
  path: /metrics
  interval: 40s
  portname: metrics

env:
  METRICS_PORT: 4016
  LOGGER_HOST: http://loki-write.monitoring.svc.cluster.local:3100
  LOGGER_SERVICE: contentserver
