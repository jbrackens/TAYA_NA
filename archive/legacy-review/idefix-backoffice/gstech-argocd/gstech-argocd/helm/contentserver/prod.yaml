nameOverride: "prod-gstech-contentserver-service"
fullnameOverride: "prod-gstech-contentserver-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

service:
  enabled: true
  type: ClusterIP
  port: 3016
  metricsPort: 4001

extraTCPPorts:
  private-api: 3017

ingressClassName: nginx

ingress:
  enabled: true

  name: prod-gstech-contentserver-service
  hosts:
  - host: content.luckydino.com
    paths:
    - path: /
      pathType: Prefix
      serviceName: prod-gstech-contentserver-service
      servicePort: 3016

  annotations: {}

  tls: []

env:
  NODE_ENV: production
  BACKEND_URL: http://prod-gstech-backend-service:3001
  REWARD_SERVER_URL: http://prod-gstech-rewardserver-service:3012/api/v1
  REWARD_SERVER_MANAGEMENT_URL: http://prod-gstech-rewardserver-service:3011/api/v1
  CAMPAIGN_SERVER_PRIVATE_URL: http://prod-gstech-campaignserver-backend-service:3014/api/v1
  CAMPAIGN_SERVER_URL: http://prod-gstech-campaignserver-backend-service
  PAYMENT_SERVER_URL: http://prod-gstech-paymentserver-service:3007/api/v1
  COMPLIANCE_SERVER_URL: http://prod-gstech-compliance-service:3009/api/v1
  GAME_SERVER_URL: http://prod-gstech-walletserver-service:3004/api/v1
  PUBLIC_URL: https://content.luckydino.com
  KAFKA_ENABLED: "false"
  KAFKA_HOST: b-1.luckydino-prod-kafka.pofjr3.c3.kafka.eu-west-1.amazonaws.com,b-2.luckydino-prod-kafka.pofjr3.c3.kafka.eu-west-1.amazonaws.com,b-3.luckydino-prod-kafka.pofjr3.c3.kafka.eu-west-1.amazonaws.com
