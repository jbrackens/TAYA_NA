nameOverride: "prod-olaspill-strapi-cms"
fullnameOverride: "prod-olaspill-strapi-cms"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

serviceAccount:
  create: true
  name: "olaspill-strapi-cms"
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::743851384875:role/luckydino-prod-olaspill-strapi-cms-s3

service:
  enabled: true
  type: ClusterIP
  port: 3000

ingressClassName: nginx

ingress:
  enabled: true

  name: prod-olaspill-strapi-cms
  hosts:
  - host: strapi.olaspill.com
    paths:
    - path: /
      pathType: Prefix
      serviceName: prod-olaspill-strapi-cms
      servicePort: 3000

  annotations: {}

  tls: []

env:
  DATABASE_CLIENT: postgres
  DATABASE_TYPE: postgres
  DATABASE_HOST: luckydino-prod-rds-olaspill-strapi-cms.cloxx4gelzda.eu-west-1.rds.amazonaws.com
  DATABASE_PORT: 5432
  DATABASE_USERNAME: strapi_cms
  DATABASE_NAME: strapi_cms
  DATABASE_SSL: false
  HOST: "0.0.0.0"
  PORT: 3000
  STRAPI_TELEMETRY_DISABLED: true
  NODE_ENV: "production"
  ENABLE_S3_UPLOAD: true
  AWS_BUCKET_NAME: "prod-olaspill-strapi-cms-data"
  AWS_REGION: "eu-west-1"
secretEnv:
  DATABASE_PASSWORD:
    prod-olaspill-strapi-cms: postgres-password
  JWT_SECRET:
    prod-olaspill-strapi-cms: jwt-secret
  ADMIN_JWT_SECRET:
    prod-olaspill-strapi-cms: admin-jwt-secret
  API_TOKEN_SALT:
    prod-olaspill-strapi-cms: api-token-salt
  APP_KEYS:
    prod-olaspill-strapi-cms: app-keys
