nameOverride: "prod-gstech-rewardserver-service"
fullnameOverride: "prod-gstech-rewardserver-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 6
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

service:
  enabled: true
  port: 3011

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::743851384875:role/luckydino-prod-fasttrack-csv-s3

extraTCPPorts:
  private-api: 3012

ingressClassName: nginx

ingress:
  enabled: false

