nameOverride: "dev-gstech-compliance-service"
fullnameOverride: "dev-gstech-compliance-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

service:
  enabled: true
  type: ClusterIP
  port: 3009

env:
  NODE_ENV: development
  REDIS_HOST: redis.dev.eeg.viegg.net
  REDIS_PORT: 6379
