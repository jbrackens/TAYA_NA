nameOverride: "dev-gstech-metabase-service"
fullnameOverride: "dev-gstech-metabase-service"

replicaCount: 1

image:
  repository: metabase/metabase
  pullPolicy: Always
  tag: "v0.50.23"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}


service:
  enabled: true
  type: ClusterIP
  port: 3000

ingressClassName: nginx

ingress:
  enabled: true

  name: alb-ingress-dev-gstech-metabase-service
  hosts:
  - host: reporting-luckydino.dev.eeg.viegg.net
    paths:
    - path: /
      pathType: Prefix
      serviceName: dev-gstech-metabase-service
      servicePort: 3000

  namespace: dev
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '600'
    external-dns.alpha.kubernetes.io/target: d31406xc47scem.cloudfront.net
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"

  tls: []

env:
  MB_DB_TYPE: postgres
  MB_DB_DBNAME: metabase
  MB_DB_PORT: 5432
  MB_DB_USER: metabase
  MB_DB_HOST: rds.dev.eeg.viegg.net
  JAVA_TIMEZONE: Europe/Malta
secretEnv:
  MB_DB_PASS:
    dev-gstech-metabase-service: postgres-password
