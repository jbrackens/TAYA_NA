nameOverride: "dev-affmore-backend-service"
fullnameOverride: "dev-affmore-backend-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

service:
  enabled: true
  type: ClusterIP
  port: 3033

extraTCPPorts:
  private-api: 3034

ingressClassName: nginx

ingress:
  enabled: true

  name: alb-ingress-dev-affmore-backend-service
  hosts:
  - host: backoffice-affmore.dev.eeg.viegg.net
    paths:
    - path: /api/
      pathType: Prefix
      serviceName: dev-affmore-backend-service
      servicePort: 3033
    - path: /click/
      pathType: Prefix
      serviceName: dev-affmore-backend-service
      servicePort: 3033
    - path: /clk/
      pathType: Prefix
      serviceName: dev-affmore-backend-service
      servicePort: 3033
    - path: /ref/
      pathType: Prefix
      serviceName: dev-affmore-backend-service
      servicePort: 3033
    - path: /
      pathType: Prefix
      serviceName: dev-affmore-client-service
      servicePort: 3050

  annotations:
    external-dns.alpha.kubernetes.io/target: d31406xc47scem.cloudfront.net
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"

  tls: []

env:
  NODE_ENV: development
  POSTGRES_HOST: rds.dev.eeg.viegg.net
  POSTGRES_USER: affmore
  BACKEND_URL: http://dev-gstech-backend-service:3001
  REDIS_HOST: redis.dev.eeg.viegg.net
  REDIS_PORT: 6379
  LOGGER_ENABLED: "false"
  MINIO_HOST: s3.eu-central-1.amazonaws.com
  MINIO_BUCKET_NAME: bucket-affmore.dev.eeg
  MINIO_PORT: 443
  MINIO_USE_SSL: "true"
  MINIO_REGION: eu-central-1
  CF_CERTS_URL: https://backoffice-affmore.dev.eeg.viegg.net/cdn-cgi/access/certs
  TC_VERSION: 10
  # CRON_DISABLED: 'true'
secretEnv:
  POSTGRES_PASSWORD:
    dev-affmore-backend-service: postgres-password
  MINIO_ACCESS_KEY:
    dev-affmore-backend-service: minio-access-key
  MINIO_SECRET_KEY:
    dev-affmore-backend-service: minio-secret-key
  GOOGLE_CLIENT_ID:
    dev-affmore-backend-service: google-client-id
  GOOGLE_CLIENT_SECRET:
    dev-affmore-backend-service: google-client-secret
