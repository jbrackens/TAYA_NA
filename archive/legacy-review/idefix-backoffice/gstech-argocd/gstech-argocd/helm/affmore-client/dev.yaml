nameOverride: "dev-affmore-client-service"
fullnameOverride: "dev-affmore-client-service"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

service:
  enabled: true
  type: ClusterIP
  port: 3050

ingress:
  enabled: false

env:
  NODE_ENV: development
  ENDPOINT: http://dev-affmore-backend-service/api/v1
secretEnv:
  REACT_APP_GOOGLE_CLIENT_ID:
    dev-affmore-client-service: google-client-id
