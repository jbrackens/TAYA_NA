nameOverride: "dev-idefix-cms"
fullnameOverride: "dev-idefix-cms"

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podAnnotations: {}

serviceAccount:
  create: true
  name: "idefix-cms"
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::743851384875:role/luckydino-dev-idefix-cms-s3

service:
  enabled: true
  type: ClusterIP
  port: 3000

ingressClassName: nginx

ingress:
  enabled: true

  name: alb-ingress-dev-idefix-cms
  hosts:
  - host: idefix-cms.dev.eeg.viegg.net
    paths:
    - path: /
      pathType: Prefix
      serviceName: dev-idefix-cms
      servicePort: 3000

  annotations:
    external-dns.alpha.kubernetes.io/target: d31406xc47scem.cloudfront.net
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"

  tls: []

env:
  DATABASE_HOST: db-idefix-cms.dev.eeg.viegg.net
  DATABASE_PORT: 5432
  DATABASE_USERNAME: idefix
  DATABASE_NAME: idefix
  DATABASE_SSL: false
  HOST: "0.0.0.0"
  PORT: 3000
  STRAPI_TELEMETRY_DISABLED: true
  NODE_ENV: "production"
  ENABLE_S3_UPLOAD: true
  AWS_BUCKET_NAME: "dev-idefix-cms-content"
  AWS_REGION: "eu-central-1"
  APP_KEYS: "vyUVHn/jg6jRxjUuEcBMHQ=="
secretEnv:
  DATABASE_PASSWORD:
    dev-idefix-cms: postgres-password
  JWT_SECRET:
    dev-idefix-cms: jwt-secret
  ADMIN_JWT_SECRET:
    dev-idefix-cms: admin-jwt-secret
  API_TOKEN_SALT:
    dev-idefix-cms: api-token-salt
