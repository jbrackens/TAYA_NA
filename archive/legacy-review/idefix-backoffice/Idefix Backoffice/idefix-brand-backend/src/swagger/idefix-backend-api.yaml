---
swagger: "2.0"
info:
  version: "1.0.0"
  title: "Idefix Backend API"
basePath: "/api"
schemes:
  - "https"
  - "http"
paths:
  /login:
    post:
      tags:
        - "auth"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/LoginWithEmailDraft"
      summary: Login via email and password
      consumes:
        - "application/json"
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/LoginResponse"
  /register:
    post:
      tags:
        - "auth"
      summary: Default registration
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/DefaultRegistration"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/RegistrationResponse"
  /register/phone:
    post:
      tags:
        - "auth"
      summary: Activate phone number
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/LoginCompleteRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/LoginCompleteResponse"
  /logout:
    post:
      tags:
        - "auth"
      summary: Logout
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/OKResponse"
  /login/phone:
    post:
      tags:
        - "auth"
      summary: Request code
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
        - in: "query"
          type: "boolean"
          name: "retry"
          required: false
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/SendCodeRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/SendCodeResponse"
  /login/phone/confirm:
    post:
      tags:
        - "auth"
      summary: Confirm phone number
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/LoginCompleteRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/LoginCompleteResponse"
  /password/reset:
    post:
      tags:
        - "auth"
      summary: Reset password
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
        - in: "query"
          type: "boolean"
          name: "retry"
          required: false
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/ResetPasswordRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/ResetPasswordResponse"
  /password/reset/confirm:
    post:
      tags:
        - "auth"
      summary: Reset password complete
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/ResetPasswordCompleteRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/LoginResponse"
  /cms/{path}:
    get:
      tags:
        - "cms"
      summary: Get CMS content
      parameters:
        - in: "path"
          name: "path"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/CmsPageOptions"
  /selfexclusion:
    post:
      tags:
        - "selfExclusion"
      summary: Change self exclusion
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/SelfExclusionRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/SelfExclusionResponse"
  /selfexclusion/remove:
    post:
      tags:
        - "selfExclusion"
      summary: Remove self exclusion
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/RemoveSelfExclusionRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/LoginRestriction"
  /config:
    get:
      tags:
        - "config"
      summary: Get config
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Config"
  /profile:
    get:
      tags:
        - "profile"
      summary: Get profile
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetProfileResponse"
    post:
      tags:
        - "profile"
      summary: Update language
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/UpdateLanguageRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Profile"
  /password:
    post:
      tags:
        - "profile"
      summary: Change password
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/ChangePasswordRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/ChangePasswordResponse"
  /password/set:
    post:
      tags:
        - "profile"
      summary: Set password
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/SetPasswordRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/ChangePasswordResponse"
  /init:
    get:
      tags:
        - "games"
      summary: Get games
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetGamesResponse"
  /init/nonloggedin:
    get:
      tags:
        - "games"
      summary: Get free games
      produces:
        - "application/json"
      parameters:
        - in: "query"
          type: "string"
          name: "_lang"
          required: true
          description: Language
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetGamesResponse"
  /start-game/${gameId}:
    post:
      tags:
        - "game"
      summary: Start game
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "gameId"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/StartGameResponse"
  /start-free-game/${gameId}:
    post:
      tags:
        - "game"
      summary: Start free game
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "gameId"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/StartGameResponse"
  /refresh-game/${gameId}:
    post:
      tags:
        - "game"
      summary: Refresh game
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "gameId"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/RefreshGameUpdate"
  /localizations:
    get:
      tags:
        - "locales"
      summary: Get available locales
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Locales"
  /balance:
    get:
      tags:
        - "balance"
      summary: Get balance
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetBalanceResponse"
  /statistics:
    get:
      tags:
        - "realityCheck"
      summary: Get statistics
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetStatisticsResponse"
  /page/${locale}/${page}:
    get:
      tags:
        - "campaignDialog"
      summary: Get campaign dialog content
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "locale"
          type: "string"
          required: true
        - in: "path"
          name: "page"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetCampaignDialogContentResponse"
  /localizations/bonusterms:
    get:
      tags:
        - "termsConditions"
      summary: Get bonus terms
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/TermsConditions"
  /localizations/privacypolicy:
    get:
      tags:
        - "termsConditions"
      summary: Get privacy policy
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/TermsConditions"
  /localizations/tc:
    get:
      tags:
        - "termsConditions"
      summary: Get terms conditions
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/TermsConditions"
  /tc-accept:
    post:
      tags:
        - "termsConditions"
      summary: Confirm T&C
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/OKResponse"
  /register/complete:
    post:
      tags:
        - "register"
      summary: Submit register
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/RegisterCompleteRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/RegisterCompleteResponse"
  /questionnaire/${id}:
    post:
      tags:
        - "questionnaires"
      summary: Submit questionnaire
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "id"
          required: true
          type: "string"
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/SubmitQuestionnaireRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/SubmitQuestionnaireResponse"
  /statement:
    get:
      tags:
        - "transactionHistory"
      summary: Get transaction history
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetTransactionHistoryResponse"
  /inbox:
    get:
      tags:
        - "notifications"
      summary: Get notifications
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetNotificationsResponse"
  /inbox/{id}:
    get:
      tags:
        - "notifications"
      summary: Get notification by id
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "id"
          required: true
          type: "string"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Notification"
# resendLink ???
  /withdraw/pending:
    get:
      tags:
        - "pendingWithdraw"
      summary: Get pending withdraw
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/PendingWithdrawResponse"
  /withdraw/{id}:
    delete:
      tags:
        - "pendingWithdraw"
      summary: Remove pending withdraw
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "id"
          required: true
          type: "string"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/PendingWithdrawResponse"
  /limits:
    get:
      tags:
        - "limits"
      summary: Get list of limits
      consumes:
        - "application/json"
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/ApiExclusion"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/GeneralResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/GeneralResponse"
    post:
      tags:
        - "limits"
      summary: Set limit
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/LimitRequest"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Exclusion"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/GeneralResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/GeneralResponse"
  /limits/{limitId}:
    delete:
      tags:
        - "limits"
      summary: Remove limit
      consumes:
        - "application/json"
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "limitId"
          type: "string"
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Exclusion"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/GeneralResponse"
        500:
          description: Internal server error
          schema:
            $ref: "#/definitions/GeneralResponse"
  /subscription:
    get:
      tags:
        - "subscription"
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Subscription"
    post:
      tags:
        - "subscription"
      produces:
        - "application/json"
      consumes:
        - "application/json"
      parameters:
        - in: "body"
          name: "URLSearchParams"
          required: false
          schema:
            type: "object"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/OKResponse"
  /subscription/reset:
    post:
      tags:
        - "subscription"
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/OKResponse"
  /subscription-v2:
    get:
      tags:
        - "subscription v2"
      produces:
        - "application/json"
      parameters:
        - in: "query"
          name: "token"
          type: "string"
          required: false
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetSubscriptionV2Response"
    put:
      tags:
        - "subscription v2"
      produces:
        - "application/json"
      consumes:
        - "application/json"
      parameters:
        - in: "query"
          name: "token"
          type: "string"
          required: false
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/UpdateSubscriptionV2Body"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/OKResponse"
  /subscription-v2/snooze:
    post:
      tags:
        - "subscription v2"
      produces:
        - "application/json"
      consumes:
        - "application/json"
      parameters:
        - in: "query"
          name: "token"
          type: "string"
          required: false
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/SnoozeSubscriptionV2Body"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/OKResponse"
  /rewards:
    get:
      tags:
        - "rewards"
      summary: Get rewards
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetRewardsResponse"
  /rewards/{id}:
    post:
      tags:
        - "rewards"
      summary: Get reward by id
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "id"
          required: true
          type: "string"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/GetRewardResponse"
  /withdraw:
    get:
      tags:
        - "withdraw"
      summary: Get withdraw
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Withdraw"
    post:
      tags:
        - "withdraw"
      summary: Withdraw balance
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "URLSearchParams"
          required: false
          schema:
            type: "object"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/WithdrawBalanceResponse"
  /identify:
    post:
      tags:
        - "withdraw"
      summary: Check bank indentify
      produces:
        - "application/json"
      parameters:
        - in: "body"
          name: "URLSearchParams"
          required: false
          schema:
            type: "object"
      responses:
        200:
          description: OK
          schema:
            type: "object"
  /activation/resend:
    post:
      tags:
        - "withdraw"
      summary: Send activation link
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/OKResponse"
  /deposit:
    get:
      tags:
        - "deposit"
      summary: Get deposit
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/Deposit"
    post:
      tags:
        - "deposit"
      summary: Create deposit
      produces:
        - "application/json"
      consumes:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            type: "object"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/CreateDepositResponse"
  /deposit/process/{id}:
    get:
      tags:
        - "deposit"
      summary: Get deposit process
      produces:
        - "application/json"
      parameters:
        - in: "path"
          name: "id"
          required: true
          type: "string"
      responses:
        200:
          description: OK
          schema:
            type: "object"
            required:
              - "status"
            properties:
              status:
                type: "string"
                enum: ["failed", "pending", "complete"]
  /deposit-done:
    get:
      tags:
        - "deposit"
      summary: Get deposit done
      produces:
        - "application/json"
      responses:
        200:
          description: OK
          schema:
            type: "object"
  /deposit/pnp:
    post:
      tags:
        - "deposit"
      produces:
        - "application/json"
      consumes:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            type: "object"
            required:
              - "amount"
            properties:
              amount:
                type: "string"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/PnpResponse"
  /deposit/register:
    post:
      tags:
        - "deposit"
      produces:
        - "application/json"
      consumes:
        - "application/json"
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            type: "object"
            required:
              - "amount"
            properties:
              amount:
                type: "string"
              bonus:
                type: "string"
      responses:
        200:
          description: OK
          schema:
            $ref: "#/definitions/DepositRegisterResponse"
definitions:
  LoginResponse:
    type: "object"
    required:
      - "ok"
    properties:
      ok:
        type: "boolean"
      code:
        type: "string"
      result:
        type: "string"
      deposits:
        type: "boolean"
      nextUrl:
        type: "string"
      restrictionActive:
        type: "boolean"
      content:
        type: "string"
      showRestrictionRequest:
        type: "boolean"
      expires:
        type: "string"
      exclusionKey:
        type: "string"
      permanent:
        type: "string"
  LoginWithEmailDraft:
    type: "object"
    required:
      - "email"
      - "password"
      - "language"
      - "tz"
      - "token"
    properties:
      email:
        type: "string"
      password:
        type: "string"
      language:
        type: "string"
      tz:
        type: "number"
      token:
        type: "string"
  DefaultRegistration:
    type: "object"
    required:
      - "pinCode"
      - "lander"
      - "bonusCode"
      - "firstName"
      - "lastName"
      - "address"
      - "postCode"
      - "city"
      - "dateOfBirth"
      - "countryISO"
      - "currencyISO"
      - "phone"
      - "receivePromotional"
      - "accept"
      - "lang"
      - "email"
      - "password"
    properties:
      pinCode:
        type: "string"
      lander:
        type: "string"
      bonusCode:
        type: "string"
      firstName:
        type: "string"
      lastName:
        type: "string"
      address:
        type: "string"
      postCode:
        type: "string"
      city:
        type: "string"
      dateOfBirth:
        type: "string"
      countryISO:
        type: "string"
      currencyISO:
        type: "string"
      phone:
        type: "string"
      receivePromotional:
        type: "string"
      accept:
        type: "string"
      lang:
        type: "string"
      email:
        type: "string"
      password:
