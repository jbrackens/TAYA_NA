   </clipPath>
 </defs>
 <g id="live">
  
  <g style="clip-path:url(#lvttclp)">
   <g>
    <rect  id="lvtotop" class="fil0" x="349" y="350" width="383" height="250"/>
   </g>
  </g>
  
  
