<svg id="live" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="400px" height="400px" version="1.1" style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd"
viewBox="0 0 1080 1080"
 xmlns:xlink="http://www.w3.org/1999/xlink">
 <defs>
  <style type="text/css">
   <![CDATA[
    #live .fil0 {fill:white}
	 #live *{
		-webkit-animation-timing-function: linear;
		animation-timing-function: linear;
		animation-fill-mode:forwards;
		animation-iteration-count: 1;
	}
	#live #lvhd{
		animation-name:lvhd;
		animation-duration:0.5s;
		transform-origin:1px 1px;
	}
	@keyframes lvhd{
			0%{transform:translate(0,100px);fill-opacity:0}
			40%{transform:translate(0,-20px);}
			70%{transform:translate(0,10px);}
			90%{transform:translate(0,-5px);fill-opacity:1}
			100%{transform:translate(0,0px);}
		}

	#lvtotop{
		animation-name:lvtotop;
		animation-duration:0.5s;
		animation-delay:0.4s;
	}
		@keyframes lvtotop{
			0%{transform:translate(0,0)}
			100%{transform:translate(0,250px)}
		}
	#lvtobot{
		animation-name:lvtobot;
		animation-duration:0.5s;
		animation-delay:0.6s;
	}
		@keyframes lvtobot{
			0%{transform:translate(0,0)}
			100%{transform:translate(0,-250px)}
		}
		
   ]]>
  </style>
