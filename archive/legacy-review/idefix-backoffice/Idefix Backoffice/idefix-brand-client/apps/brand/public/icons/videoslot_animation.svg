<svg id="slots" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" width="400px" height="400px" version="1.1" 
style="shape-rendering:geometricPrecision; text-rendering:geometricPrecision; image-rendering:optimizeQuality; fill-rule:evenodd; clip-rule:evenodd"
viewBox="0 0 1080 1080"
 xmlns:xlink="http://www.w3.org/1999/xlink">
 <defs>
  <style type="text/css">
   <![CDATA[
     #slots .fil0 {fill:white}
	 #slots *{
		-webkit-animation-timing-function: ease-out;
		animation-timing-function: cubic-bezier(0.5, 1, 0.89, 1);
		animation-fill-mode:forwards;
		animation-iteration-count: 1;
	}
	#slch1,#slchclp{
		animation-name:slch1;
		animation-duration:0.7s;
		transform-origin:609px 367px;
	}
	@keyframes slch1{
		0%{transform:rotate(0deg);fill-opacity:0;}
		50%{transform:rotate(10deg);}
		100%{transform:rotate(0deg);fill-opacity:1;}
	}
	#slch2{
		animation-name:slch2;
		animation-duration:0.7s;
		transform-origin:601px 369px;
	}
	@keyframes slch2{
		0%{transform:rotate(0deg);fill-opacity:0;}
		50%{transform:rotate(-10deg);}
		100%{transform:rotate(0deg);fill-opacity:1;}
	}
	
   ]]>
  </style>
