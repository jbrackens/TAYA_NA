name: Release

on:
  release:
    types: [published]

env:
  RELEASE-ASSET: idfx-${{ github.event.release.tag_name }}.tar.gz

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.release.target_commitish }}

      - name: Tarball project
        run: |
          tar -czvf Formula/${{ env.RELEASE-ASSET }} idfx

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./Formula/${{ env.RELEASE-ASSET }}
          asset_name: ${{ env.RELEASE-ASSET }}
          asset_content_type: application/gzip

      - name: Update Local Homebrew Formula
        run: |
          URL="file://#{__dir__}/${{ env.RELEASE-ASSET }}"
          SHA256=$(cat ./Formula/${{ env.RELEASE-ASSET }} | shasum -a 256 | cut -f 1 -d ' ')
          VERSION=${{ github.event.release.tag_name }} && VERSION=${VERSION#v}
          sed -i "s|^  url \".*\"|  url \"$URL\"|" ./Formula/idfx.rb
          sed -i "s/^  version \".*\"/  version \"$VERSION\"/" ./Formula/idfx.rb
          sed -i "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" ./Formula/idfx.rb
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ./Formula/idfx.rb
          git commit -m "Auto update version and sha256 for release ${{ github.event.release.tag_name }}"
          git push origin main

      - name: Push Homebrew Formula
        uses: cpina/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        with:
          source-directory: ./Formula
          destination-github-username: flipadmin
          destination-repository-name: homebrew-idfx-cli
          user-email: sean.bugeja@eeg.tech
          commit-message: "Auto update version and sha256 for release ${{ github.event.release.tag_name }}"
