name: CI
on:
  push:
    branches: [ master, dev, feature/* ]
  pull_request:
    branches: [ master, dev ]
env:
  CI: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Use Node.js
      uses: actions/setup-node@v2
      with:
        node-version: "16.x"

    - name: Install Dependencies
      run: yarn install

    - name: Build
      run: yarn build

    - name: Test
      run: yarn test
