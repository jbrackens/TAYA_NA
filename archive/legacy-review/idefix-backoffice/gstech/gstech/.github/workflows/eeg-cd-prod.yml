name: EEG CD PROD

on:
  release:
    types: [created]

env:
  AWS-ACCESS-KEY-ID: ${{ secrets.EEG_AWS_ACCESS_KEY_ID }}
  AWS-SECRET-ACCESS-KEY: ${{ secrets.EEG_AWS_SECRET_ACCESS_KEY }}
  role-to-assume: ${{ secrets.EEG_AWS_ROLE_TO_ASSUME }}
  role-external-id: ${{ secrets.EEG_AWS_ROLE_EXTERNAL_ID }}
  role-duration-seconds: 3600
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Do not change
  HELM_VERSION: 'v3.5.4'
  environment: 'prod'

jobs:
  # --------------------------------------------------------------------------
  # Push to ECR
  # --------------------------------------------------------------------------
  ecr:
    if: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-20.04]
        container:
          - affmore-backend
          - brandserver-backend
          - gstech-backend
          - gstech-campaignserver
          - gstech-compliance
          - gstech-paymentserver
          - gstech-rewardserver
          - gstech-walletserver

    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - run:
          git lfs pull --exclude="*-darwin"

      - name: Extract branch name
        shell: bash
        run: echo "##[set-output name=branch;]$(echo ${GITHUB_REF#refs/heads/})"
        id: extract_branch

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-central-1
          role-to-assume: arn:aws:iam::743851384875:role/luckydino-ecr-push-role
          role-duration-seconds: 3600
          role-session-name: GitHubActions

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: debug
        uses: hmarr/debug-action@v3

      - name: For each service (matrix) - Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.container }}
          IMAGE_TAG: ${{github.sha}}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          docker build -t ${{ matrix.container }}-$IMAGE_TAG -f packages/${{ matrix.container }}/Dockerfile .
          docker tag ${{ matrix.container }}-$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:${BRANCH_NAME}-$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${BRANCH_NAME}-$IMAGE_TAG

      - name: Log out of Amazon ECR
        if: always()
        run: docker logout ${{ steps.login-ecr.outputs.registry }}

  jira:
    runs-on: ubuntu-20.04
    needs: ecr
    if: ${{ always() && contains(join(needs.*.result, ','), 'success') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch entire Git history (including tags)
        run: git fetch --prune --unshallow --tags
        shell: bash

      - name: Gather issues from latest release
        shell: bash
        run: ./.github/scripts/jira.sh issues

      - name: Format release body content
        shell: bash
        run: echo "${{ github.event.release.body }}" | ./.github/scripts/jira.sh notes

      - name: debug
        uses: hmarr/debug-action@v3

      - name: Make POST request to JIRA Webhook
        if: ${{ env.JIRA_ISSUES != '[]' }}
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.JIRA_AUTOMATION_WEBHOOK }}
          method: 'POST'
          data: >-
            {
              "projectName": "IDXD",
              "appName": "gstech",
              "notes": ${{ env.RELEASE_NOTES }},
              "version": "${{ github.event.release.tag_name }}",
              "issues": ${{ env.JIRA_ISSUES }}
            }
