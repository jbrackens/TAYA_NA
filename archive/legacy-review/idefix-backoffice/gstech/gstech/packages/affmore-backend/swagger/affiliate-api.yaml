      tags:
        - "affiliate api"
      security:
        - Affiliate-API-Token: []
      produces:
      - "application/json"
      parameters:
      - in: "path"
        name: "year"
        type: "number"
        required: true
      - in: "path"
        name: "month"
        type: "number"
        description: "Month (1-12)"
        required: true
      - in: "query"
        name: "brandId"
        type: "string"
        enum:
          - CJ
          - FK
          - KK
          - LD
          - OS
          - SN
          - VB
      responses:
        200:
          schema:
            $ref: "#/definitions/GetAffiliatePlayersRevenuesResponse"
        400:
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          schema:
            $ref: "#/definitions/ErrorResponse"
        500:
          schema:
            $ref: "#/definitions/ErrorResponse"
  /affiliate/links:
    get:
