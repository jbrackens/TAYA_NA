---
swagger: "2.0"
info:
  version: "1.0.0"
  title: "Affmore API"
  description: "This Swagger file describes Affmore API available for integration with affiliates.
  You need a dedicated 'Affiliate API Token' to make any call this API.
  To apply API token consider 'Authorize' button on the right.
  Follow Swagger file and given examples to complete integration with Affmore API."
basePath: "/api/v1"
tags:
  - name: "affiliate api"

schemes:
- "https"
- "http"
securityDefinitions:
  Affiliate-API-Token:
    type: apiKey
    in: query
    name: token

paths:
  /affiliate:
    get:
      tags:
        - "affiliate api"
      security:
      - Affiliate-API-Token: []
      produces:
      - "application/json"
      responses:
        200:
          schema:
            $ref: "#/definitions/GetAffiliateResponse"
        400:
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          schema:
            $ref: "#/definitions/ErrorResponse"
        500:
          schema:
            $ref: "#/definitions/ErrorResponse"
  /affiliate/overview/{year}/{month}:
    get:
      tags:
        - "affiliate api"
      security:
        - Affiliate-API-Token: []
      produces:
      - "application/json"
      parameters:
      - in: "path"
        name: "year"
        type: "number"
        required: true
      - in: "path"
        name: "month"
        type: "number"
        description: "Month (1-12)"
        required: true
      responses:
        200:
          schema:
            $ref: "#/definitions/GetAffiliateOverviewResponse"
        400:
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          schema:
            $ref: "#/definitions/ErrorResponse"
        404:
          schema:
            $ref: "#/definitions/ErrorResponse"
        500:
          schema:
            $ref: "#/definitions/ErrorResponse"
  /affiliate/revenues/{year}/{month}:
