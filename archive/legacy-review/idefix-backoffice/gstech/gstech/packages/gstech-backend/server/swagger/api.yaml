openapi: 3.0.1
info:
  title: Gstech-backend API
  description: Gstech-backend API
  version: 0.0.1
servers:
  - url: http://localhost:3001/api/v1
  - url: https://localhost:3001/api/v1
paths:
  /status:
    get:
      description: healthCheckHandler
      summary: healthCheckHandler
      responses:
        200:
          $ref: '#/components/responses/OkResponse'
        500:
          description: 'Health check failed'
  /login:
    post:
      description: loginUserHandler
      summary: loginUserHandler
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
                  minLength: 8
      responses:
        200:
          description: Ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  userId:
                    type: number
                  token:
                    type: string
                  settings:
                    type: object
                    properties:
                      brands:
                        type: array
                        items:
                          $ref: '#/components/schemas/BrandInfo'
        400:
          $ref: '#/components/responses/ValidationFailed'
        403:
          $ref: '#/components/responses/ErrorResponse'
  /users/{email}/password:
    put:
      description: changePasswordHandler
      summary: changePasswordHandler
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - oldPassword
                - newPassword
                - confirmPassword
              properties:
                oldPassword:
                  type: string
                newPassword:
                  type: string
                confirmPassword:
                  type: string
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        200:
          $ref: '#/components/responses/SuccessResponse'
        400:
          description: Invalid data
  /users/password/reset:
    post:
      description: resetPasswordHandler
      summary: resetPasswordHandler
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
                - confirmPassword
                - email
                - code
              properties:
                newPassword:
                  type: string
                confirmPassword:
                  type: string
                email:
                  type: string
                code:
                  type: number
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: boolean
        400:
          description: Invalid data
  /users/{email}/password/reset/code:
    get:
      description: sendVerificationCodeHandler
      summary: sendVerificationCodeHandler
      tags:
        - auth
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: boolean
        400:
          description: Unable to process request
  /users/password/reset/code:
    post:
      description: checkVerificationCodeHandler
      summary: checkVerificationCodeHandler
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - code
              properties:
                email:
                  type: string
                code:
                  type: number
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: boolean
  /photos/{photoId}:
    parameters:
      - in: path
        name: photoId
        required: true
        schema:
          type: number
    get:
      description: getPhotoHandler
      summary: getPhotoHandler
      responses:
        200:
          description: Photo
          content:
            image/png:
              schema:
                type: string
                format: binary
    delete:
      description: removePhotoHandler
      summary: removePhotoHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - photos
      responses:
        200:
          description: OK
  /player/go/{brandId}/{username}:
    get:
      description: usernameToIdMappingHandler
      summary: usernameToIdMappingHandler
      parameters:
        - $ref: '#/components/parameters/brandId'
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        302:
          description: Redirecting to player info endpoint
  /logout:
    post:
      description: logoutUserHandler
      summary: logoutUserHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - auth
      responses:
        403:
          description: Authentication required
  /expire-password:
    post:
      description: expirePasswordHandler
      summary: expirePasswordHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - auth
      responses:
        403:
          description: Authentication required
  /settings:
    get:
      description: getSettingsHandler
      summary: getSettingsHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - settings
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isProduction:
                    type: boolean
                  roles:
                    type: array
                    items:
                      type: string
                  tasks:
                    type: array
                    items:
                      type: object
                      properties:
                        "type":
                          type: string
                        title:
                          type: string
                  brands:
                    type: array
                    items:
                      $ref: '#/components/schemas/BrandInfo'
                  paymentProviders:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                  brandsSettings:
                    type: object
                    properties:
                      KK/LD/OS/CJ:
                        type: object
                        properties:
                          countries:
                            type: array
                            items:
                              type: object
                              properties:
                                brandId:
                                  type: string
                                id:
                                  type: string
                                name:
                                  type: string
                                minimumAge:
                                  type: boolean
                                registrationAllowed:
                                  type: boolean
                                loginAllowed:
                                  type: boolean
                                blocked:
                                  type: boolean
                                riskProfile:
                                  type: string
                                monthlyIncomeThreshold:
                                  type: number
                          languages:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: string
                                name:
                                  type: string
  /player/{playerId}:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getPlayerHandler
      summary: getPlayerHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerWithUpdate'
        404:
          description: Player not found
    put:
      description: updatePlayerHandler
      summary: updatePlayerHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                address:
                  type: string
                postCode:
                  type: string
                city:
                  type: string
                countryId:
                  type: string
                  minLength: 2
                  maxLength: 2
                dateOfBirth:
                  type: string
                  format: date-time
                mobilePhone:
                  type: string
                languageId:
                  type: string
                  minLength: 2
                  maxLength: 2
                nationalId:
                  type: string
                allowEmailPromotions:
                  type: boolean
                allowSMSPromotions:
                  type: boolean
                activated:
                  type: boolean
                testPlayer:
                  type: boolean
                placeOfBirth:
                  type: string
                nationality:
                  type: string
                  minLength: 2
                  maxLength: 2
                additionalFields:
                  type: object
                reason:
                  type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerWithUpdate'
    delete:
      description: suspendPlayerHandler
      summary: suspendPlayerHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - note
                - reasons
                - accountClosed
              properties:
                note:
                  type: string
                reasons:
                  type: array
                  items:
                    type: string
                    enum: [ 'multiple', 'fake', 'fraudulent', 'suspicious', 'ipcountry', 'gambling_problem', 'data_removal' ]
                accountClosed:
                  type: boolean
      responses:
        200:
          description: OK
        400:
          description: Not able to suspend player
  /player:
    get:
      description: getPlayersHandler
      summary: getPlayersHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      parameters:
        - in: query
          name: playerIds
          required: false
          schema:
            type: array
            items:
              type: number
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerById'
  /player/gamblingproblem:
    post:
      description: registerPlayerWithGamblingProblemHandler
      summary: registerPlayerWithGamblingProblemHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - player
              properties:
                player:
                  type: object
                  required:
                    - email
                    - firstName
                    - lastName
                  properties:
                    email:
                      type: string
                    fistName:
                      type: string
                    lastName:
                      type: string
                    address:
                      type: string
                    postCode:
                      type: string
                    city:
                      type: string
                    countryId:
                      type: string
                      minLength: 2
                      maxLength: 2
                    dateOfBirth:
                      type: string
                      format: date-time
                    mobilePhone:
                      type: string
                    nationalId:
                      type: string
                note:
                  type: string
      responses:
        200:
          $ref: '#/components/responses/OkResponse'
  /player/{playerId}/financial-info:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getFinancialInfoHandler
      summary: getFinancialInfoHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
                  bonusBalance:
                    type: number
                  totalBalance:
                    type: number
                  totalBetAmount:
                    type: number
                  totalWinAmount:
                    type: number
                  rtp:
                    type: number
                  depositCount:
                    type: number
                  withdrawalCount:
                    type: number
                  totalDepositAmount:
                    type: number
                  totalWithdrawalAmount:
                    type: number
                  depositCountInSixMonths:
                    type: number
                  depositAmountInSixMonths:
                    type: number
                  withdrawalCountInSixMonths:
                    type: number
                  withdrawalAmountInSixMonths:
                    type: number
                  creditedBonusMoney:
                    type: number
                  bonusToReal:
                    type: number
                  freespins:
                    type: number
                  compensations:
                    type: number
                  bonusToDepositRatio:
                    type: number
                  depositsMinusWithdrawals:
                    type: number
                  depositsMinusWithdrawalsInSixMonths:
                    type: number
  /player/{playerId}/registration-info:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getRegistrationInfoHandler
      summary: getRegistrationInfoHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  affiliateId:
                    type: number
                  affiliateName:
                    type: string
                  affiliateRegistrationCode:
                    type: string
                  ipAddress:
                    type: string
                  registrationIP:
                    type: string
                  registrationCountry:
                    type: string
                  registrationTime:
                    type: string
                    format: date-time
                  createdAt:
                    type: string
                    format: date-time
                  lastLogin:
                    type: string
                    format: date-time
        404:
          description: Info not found
  /player/search/{tab}:
    post:
      description: searchPlayerHandler
      summary: searchPlayerHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      parameters:
        - in: path
          name: tab
          required: true
          schema:
            type: string
        - in: query
          name: type
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                brandId:
                  type: string
                filters:
                  type: object
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'
  /player/{playerId}/account-status:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getAccountStatusHandler
      summary: getAccountStatusHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player status
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStatus'
    put:
      description: updateAccountStatusHandler
      summary: updateAccountStatusHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                verified:
                  type: boolean
                allowGameplay:
                  type: boolean
                allowTransactions:
                  type: boolean
                loginBlocked:
                  type: boolean
                accountClosed:
                  type: boolean
                accountSuspended:
                  type: boolean
                gamblingProblem:
                  type: boolean
                riskProfile:
                  type: string
                  enum: [ 'low', 'medium_low', 'medium', 'medium_high', 'high' ]
                reason:
                  type: string
                pep:
                  type: boolean
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStatus'
        400:
          description: Failed to update account status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStatus'
  /player/{playerId}/active-limits:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getActiveLimitsHandler
      summary: getActiveLimitsHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player limits
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  selfExclusion/deposit/bet/loss/sessionLength/timeout:
                    $ref: '#/components/schemas/ActiveLimit'
  /player/{playerId}/limits:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getLimitsHandler
      summary: getLimitsHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player limits
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    "type":
                      type: string
                    periodTime:
                      type: string
                    status:
                      type: string
                    startTime:
                      type: string
                      format: date-time
                    endTime:
                      type: string
                      format: date-time
                    amount:
                      type: string
                    reason:
                      type: string
                    isInternal:
                      type: boolean
    post:
      description: setLimitHandler
      summary: setLimitHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player limits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - values
              properties:
                "type":
                  type: string
                  enum: [ 'selfExclusion', 'deposit', 'sessionLength', 'bet', 'loss', 'timeout' ]
                values:
                  type: object
                  required:
                    - reason
                    - period
                  properties:
                    period:
                      type: string
                      enum: [ 'daily', 'weekly', 'monthly' ]
                    duration:
                      oneOf:
                        - type: number
                        - type: string
                          enum: [ 'indefinite' ]
                    reason:
                      type: string
                    limit:
                      type: number
                    isInternal:
                      type: boolean
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerLimit'
  /player/{playerId}/limits/closed-accounts:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getPlayersWithClosedAccountsHandler
      summary: getPlayersWithClosedAccountsHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player limits
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    firstName:
                      type: string
                    lastName:
                      type: string
                    brandId:
                      type: string
                    email:
                      type: string
                      format: email
                    username:
                      type: string
  /player/{playerId}/limits/{limitId}:
    parameters:
      - $ref: '#/components/parameters/playerId'
      - in: path
        name: limitId
        required: true
        schema:
          type: number
    post:
      description: raiseLimitHandler
      summary: raiseLimitHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player limits
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
                - period
              properties:
                reason:
                  type: string
                period:
                  type: string
                limit:
                  type: number
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerLimit'

  /limits/{exclusionKey}:
    delete:
      description: cancelLimitHandler
      summary: cancelLimitHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player limits
      parameters:
        - in: path
          name: exclusionKey
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                delay:
                  type: boolean
                reason:
                  type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      playerId:
                        type: number
                      expires:
                        type: string
                        format: date-time
                      exclusionKey:
                        type: string
                        format: uuid
                  - type: object
                    properties:
                      playerId:
                        type: number
                      cancelled:
                        type: string
                        format: date-time
  /player/{playerId}/status:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getStatusHandler
      summary: getStatusHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerStatus'
  /player/{playerId}/events:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getEventsHandler
      summary: getEventsHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - players
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerEvent'
  /player/{playerId}/notes:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getNotesHandler
      summary: getNotesHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player notes
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerEvent'
    post:
      description: addNoteHandler
      summary: addNoteHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerEvent'
  /player/{playerId}/notes/{noteId}/archive:
    parameters:
      - $ref: '#/components/parameters/playerId'
      - in: path
        name: noteId
        required: true
        schema:
          type: number
    put:
      description: archiveNoteHandler
      summary: archiveNoteHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player notes
      responses:
        200:
          description: OK
  /player/{playerId}/tags:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getPlayerTagsHandler
      summary: getPlayerTagsHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player tags
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    post:
      description: addPlayerTagHandler
      summary: addPlayerTagHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player tags
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tag
              properties:
                tag:
                  type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /player/{playerId}/tags/{tag}:
    parameters:
      - $ref: '#/components/parameters/playerId'
      - in: path
        name: tag
        required: true
        schema:
          type: string
    delete:
      description: removePlayerTagHandler
      summary: removePlayerTagHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player tags
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /player/{playerId}/notes/sticky:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getPlayerStickyNoteHandler
      summary: getPlayerStickyNoteHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player notes
      responses:
        200:
          description: OK
          content:
            appliction/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
    post:
      description: setPlayerStickyNoteHandler
      summary: setPlayerStickyNoteHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
      responses:
        200:
          $ref: '#/components/responses/OkResponse'
  /player/{playerId}/transactions:
    parameters:
      - $ref: '#/components/parameters/playerId'
    get:
      description: getTransactionsHandler
      summary: getTransactionsHandler
      security:
        - ApiAuthorizationToken: [ ]
      tags:
        - player transactions
      parameters:
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/pageIndex'
        - in: query
          name: startDate
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          required: true
          schema:
            type: string
            format: date-time
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    amount:
                      type: string
                    bonusAmount:
                      type: string
                    bonusBalance:
                      type: string
                    realBalance:
                      type: string
                    rawAmount:
                      type: string
                    rawBonusAmount:
                      type: string
                    rawBonusBalance:
                      type: number
                    rawRealBalance:
                      type: number
                    "type":
                      type: string
