components:
  securitySchemes:
    ApiAuthorizationToken:
      type: apiKey
      name: Authorization
      in: header
  parameters:
    brandId:
      in: path
      name: brandId
      required: true
      schema:
        type: string
        enum: [ 'KK', 'OS', 'LD', 'CJ' ]
    playerId:
      in: path
      name: playerId
      required: true
      schema:
        type: number
    countryId:
      in: path
      name: countryId
      required: true
      schema:
        type: string
        minLength: 2
        maxLength: 2
    pageIndex:
      in: query
      name: pageIndex
      required: false
      schema:
        type: integer
        minimum: 1
    pageSize:
      in: query
      name: pageSize
      required: false
      schema:
        type: integer
        minimum: 1
  responses:
    OkResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              ok:
                type: boolean
    SuccessResponse:
      description: Succesfully finished
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
    ValidationFailed:
      description: Schema validation failed
    ErrorResponse:
      description: Processing request failed
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: number
              message:
                type: string
    PlayerIdResponse:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              playerId:
                type: integer
    PaymentSummaryReportResponse:
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                title:
                  type: string
                "type":
                  type: string
                amount:
                  type: string
                transactions:
                  type: number
  schemas:
    Any:
      description: Any type
    BrandInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        site:
          type: string
        url:
          type: string
        cdnUrl:
          type: string
    Player:
      type: object
      properties:
        id:
          type: number
        brandId:
          type: string
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        address:
          type: string
        postCode:
          type: string
        city:
          type: string
        mobilePhone:
          type: string
        countryId:
          type: string
        dateOfBirth:
          type: string
          format: date-time
        languageId:
          type: string
        nationalId:
          type: string
        currencyId:
          type: string
        allowEmailPromotions:
          type: boolean
        allowSMSPromotions:
          type: boolean
        gamblingProblem:
          type: boolean
        accountClosed:
          type: boolean
        accountSuspended:
          type: boolean
        testPlayer:
          type: boolean
        createdAt:
          type: string
          format: date-time
        activated:
          type: boolean
        verified:
          type: boolean
        tcVersion:
          type: string
        placeOfBirth:
          type: string
        nationality:
          type: string
        additionalFields:
          type: object
    PlayerById:
      allOf:
        - $ref: '#/components/schemas/Player'
        - type: object
          properties:
            lastLogin:
              type: string
              format: date-time
            kycDocuments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: number
