backend gstech-campaignserver
    server app1 gstech-campaignserver:3013 check inter 20000 fall 2 rise 1
    http-request set-header X-Client-IP %[src]
    http-request set-header X-Forwarded-Proto https
    option httpchk
    http-check send meth GET uri /api/v1/status
    timeout server 90s

backend gstech-campaignserver-client
    server app1 gstech-campaignserver-client:3051 check inter 20000 fall 2 rise 1
    http-request set-header X-Client-IP %[src]
    http-request set-header X-Forwarded-Proto https
    option httpchk
    http-check send meth GET uri /
    timeout server 90s

