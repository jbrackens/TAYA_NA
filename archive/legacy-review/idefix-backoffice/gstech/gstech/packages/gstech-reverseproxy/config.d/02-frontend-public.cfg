frontend frontend-public:3000
    bind *:3000
    maxconn 5000
    monitor-uri /api/status/up
    capture request header Host len 64
    capture request header X-Forwarded-For len 64
    http-request set-src hdr(x-forwarded-for)

    log-format %ci:%cp\ [%t]\ %ft\ %b/%s\ %Tq/%Tw/%Tc/%Tr/%Tt\ %ST\ %B\ %CC\ %CS\ %tsc\ %ac/%fc/%bc/%sc/%rc\ %sq/%bq\ %hr\ %hs\ "x-forwarded-for":"%[capture.req.hdr(1),json("utf8s")]"\ %{+Q}r

    acl acl_cloudflare req.hdr_ip(x-forwarded-for,-1) -f /cloudflare_ips.txt
    acl acl_brandserver req.hdr_ip(x-forwarded-for,-1) -f /brandserver.txt
    acl acl_bmit req.hdr_ip(x-forwarded-for,-1) 78.110.29.211

    acl host_admin hdr_dom(host) -i admin.luckydino.com

    acl host_affmore hdr_dom(host) -i affmore.com
    acl host_affmore_backoffice hdr_dom(host) -i backoffice.affmore.com
    acl host_affmore_internal hdr_dom(host) -i affmore-binder.luckydino.com

    acl host_rewardserver_internal hdr_dom(host) -i rewardserver-binder.luckydino.com
    acl host_campaignserver_internal hdr_dom(host) -i campaignserver-binder.luckydino.com
    acl host_complianceserver_internal hdr_dom(host) -i complianceserver-binder.luckydino.com

    acl path_api path_beg /api/v1/

    use_backend gstech-rewardserver if acl_cloudflare host_admin { path -m beg /api/v1/rewards }
    use_backend gstech-rewardserver if acl_cloudflare host_admin { path -m beg /api/v1/games }

    use_backend gstech-campaignserver if acl_cloudflare host_admin path_api
    use_backend gstech-campaignserver-client if acl_cloudflare host_admin

    use_backend gstech-rewardserver-internal if acl_brandserver host_rewardserver_internal
    use_backend gstech-campaignserver-internal if acl_brandserver host_campaignserver_internal
    use_backend gstech-campaignserver-internal if host_campaignserver_internal { path -m beg /api/v1/integrations/ }

    use_backend affmore-backend if acl_cloudflare host_affmore { path -m beg /click/ }
    use_backend affmore-backend if acl_cloudflare host_affmore { path -m beg /clk/ }
    use_backend affmore-backend if acl_cloudflare host_affmore { path -m beg /ref/ }
    use_backend affmore-backend if acl_cloudflare host_affmore { path -m beg /api/ }

    use_backend affmore-backend if acl_cloudflare host_affmore_backoffice { path -m beg /click/ }
    use_backend affmore-backend if acl_cloudflare host_affmore_backoffice { path -m beg /clk/ }
    use_backend affmore-backend if acl_cloudflare host_affmore_backoffice { path -m beg /ref/ }
    use_backend affmore-backend if acl_cloudflare host_affmore_backoffice { path -m beg /api/ }

    use_backend affmore-backend-internal if acl_bmit host_affmore_internal
    use_backend gstech-complianceserver-internal if acl_bmit host_complianceserver_internal
    use_backend affmore-client if acl_cloudflare host_affmore { path -m beg /backoffice/ }
    use_backend affmore-client if acl_cloudflare host_affmore { path -m beg /static/ }
    use_backend affmore-client if acl_cloudflare host_affmore_backoffice
    use_backend affmore-cms if acl_cloudflare host_affmore
