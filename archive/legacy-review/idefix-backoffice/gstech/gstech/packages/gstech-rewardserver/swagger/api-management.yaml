---
swagger: "2.0"
info:
  version: "1.0.0"
  title: "Rewardserver Management API"
basePath: "/api/v1/"
schemes:
  - "https"
  - "http"
paths:
  /games:
    get:
      summary: Get games
      description: Get games
      tags:
        - games
      parameters:
        - in: query
          name: "brandId"
          type: string
          required: true
          enum: ['KK', 'LD', 'CJ', 'OS']
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GetGamesResponse'
    post:
      summary: Create game
      description: Create game
      tags:
        - games
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/CreateGame'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/CreateGameResponse'
        409:
          description: 'Duplicated reward'
          schema:
            $ref: '#/definitions/ErrorResponse'
  /games/{gameId}:
    put:
      summary: Update game
      description: Update game
      tags:
        - games
      parameters:
        - in: path
          name: gameId
          type: number
          required: true
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/CreateGame'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/OKResponse'
        404:
          description: Reward not found
          schema:
            $ref: '#/definitions/ErrorResponse'
    delete:
      summary: Delete game
      description: Delete game
      tags:
        - games
      parameters:
        - in: path
          name: gameId
          type: number
          required: true
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/OKResponse'
        404:
          description: Reward not found
          schema:
            $ref: '#/definitions/ErrorResponse'
  /games/permalinks:
    get:
      summary: Get backend games permalinks
      description: Get backend games permalinks
      tags:
        - games
      parameters:
        - in: query
          name: "brandId"
          type: string
          required: true
          enum: ['KK', 'LD', 'CJ', 'OS']
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GetGamesPermalinksResponse'
  /games/game-manufacturers:
    get:
      summary: Get games manufacturers list
      description: Get games manufacturers list
      parameters:
        - in: query
          name: countryId
          type: string
          required: false
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GetGameManufacturers'
  /rewards/init:
    get:
      summary: Get initial configuration of reward definitions
      description: Get initial configuration of reward definitions
      tags:
        - rewards
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/InitResponse'
  /rewards/init-groups:
    get:
      summary: Get configuration of reward groups
      description: Get configuration of reward groups
      tags:
        - rewards
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/InitGroupsResponse'
  /rewards:
    get:
      summary: Get rewards
      description: Get rewards
      tags:
        - rewards
      parameters:
        - in: query
          name: "brandId"
          type: string
          required: true
          enum: ['KK', 'LD', 'CJ', 'OS']
        - in: query
          name: "type"
          type: string
          required: false
        - in: query
          name: "group"
          type: string
          required: false
        - in: query
          name: removed
          type: boolean
          required: false
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GetRewardsResponse'
    post:
      summary: Create new reward
      description: Create new reward
      tags:
        - rewards
      parameters:
        - in: "body"
          name: "body"
          required: true
          schema:
            $ref: "#/definitions/CreateReward"
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/CreateRewardResponse'
        409:
          description: Could not create a reward
          schema:
            $ref: '#/definitions/ErrorResponse'
  /rewards/{rewardId}:
    get:
      summary: Get reward with game
      description: Get reward with game
      tags:
        - rewards
      parameters:
        - in: path
          name: rewardId
          required: true
          type: number
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GetRewardResponse'
        404:
          description: Reward not found
          schema:
            $ref: '#/definitions/ErrorResponse'
    delete:
      summary: Remove reward
      description: Remove reward
      tags:
        - rewards
      parameters:
        - in: path
          name: rewardId
          required: true
          type: number
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/OKResponse'
        404:
          description: 'Reward not found'
          schema:
            $ref: '#/definitions/ErrorResponse'
        409:
          description: 'Reward already removed'
          schema:
            $ref: '#/definitions/ErrorResponse'
    put:
      summary: Update reward
      description: Update reward
      tags:
        - rewards
      parameters:
        - in: path
          name: rewardId
          required: true
          type: number
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/CreateReward"
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/OKResponse'
        404:
          description: 'Reward not found'
          schema:
            $ref: '#/definitions/ErrorResponse'
  /rewards/{rewardId}/credit:
    post:
      tags:
        - rewards
      summary: Credit reward to a player
      description: Credit reward to a player
      parameters:
        - in: path
          name: rewardId
          required: true
          type: number
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/CreditReward'
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/CreditRewardResponse'
        404:
          description: Reward not found
          schema:
            $ref: '#/definitions/ErrorResponse'
  /rewards/{rewardId}/duplicate:
    post:
      tags:
        - rewards
      summary: Duplicate a reward
      description: Duplicate a reward
      parameters:
        - in: path
          name: rewardId
          required: true
          type: number
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/GetRewardResponse'
        404:
          description: Reward not found
          schema:
            $ref: '#/definitions/ErrorResponse'
