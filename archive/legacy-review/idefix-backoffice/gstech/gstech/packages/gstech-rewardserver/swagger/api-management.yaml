definitions:
  GetGamesResponse:
    type: object
    properties:
      data:
        type: array
        items:
          type: object
          properties:
            id:
              type: number
            order:
              type: number
            brandId:
              type: string
            permalink:
              type: string
            name:
              type: string
            manufacturer:
              type: string
            primaryCategory:
              type: string
            aspectRatio:
              type: string
            viewMode:
              type: string
            newGame:
              type: boolean
            jackpot:
              type: boolean
            thumbnail:
              type: string
            searchOnly:
              type: boolean
            active:
              type: boolean
            keywords:
              type: string
            tags:
              type: array
              items:
                type: string
  GetGamesPermalinksResponse:
    type: object
    properties:
      data:
        type: array
        items:
          type: string
  CreateGame:
    type: object
    required:
      - brandId
      - permalink
      - name
      - primaryCategory
      - aspectRatio
      - viewMode
      - newGame
      - jackpot
      - thumbnail
      - searchOnly
      - active
    properties:
      brandId:
        type: string
      permalink:
        type: string
      name:
        type: string
      manufacturer:
        type: string
      primaryCategory:
        type: string
      aspectRatio:
        type: string
        enum: [16x9', '4:3', '3x2', 'wms-wide']
      viewMode:
        type: string
        enum: ['single', 'max']
      newGame:
        type: boolean
      jackpot:
        type: boolean
      thumbnail:
        type: string
      searchOnly:
        type: boolean
      active:
        type: boolean
      order:
        type: number
      keywords:
        type: string
      tags:
        type: array
        items:
          type: string
      parameters:
        type: object
  CreateGameResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          gameId:
            type: number
  GetGameManufacturers:
    type: object
    properties:
      data:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            parentId:
              type: string
            license:
              type: string
            active:
              type: boolean
  InitFields:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [ 'number', 'string', 'money', 'boolean' ]
        values:
          type: array
          items:
            type: string
        preview:
          type: string
  InitTable:
    type: array
    items:
      type: object
      properties:
        title:
          type: string
        property:
          type: string
  InitResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          thumbnails:
            type: object
            properties:
              BrandId:
                type: object
          rewardDefinitions:
            type: object
            properties:
              BrandId:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                    name:
                      type: string
                    type:
                      type: string
                    promotion:
                      type: string
                    fields:
                      $ref: '#/definitions/InitFields'
                    table:
                      $ref: '#/definitions/InitTable'
  InitGroupsResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          BrandId:
            type: array
            items:
              type: object
              properties:
                groupId:
                  type: string
                groupName:
                  type: string
                rewardTypes:
                  type: array
                  items:
                    type: string
                balanceGroup:
                  type: boolean
                fields:
                  $ref: '#/definitions/InitFields'
                table:
                  $ref: '#/definitions/InitTable'
  GetRewardsResponse:
    type: object
    properties:
      data:
        type: array
        items:
          $ref: '#/definitions/CreateReward'
  GetRewardResponse:
    type: object
    properties:
      data:
        $ref: '#/definitions/CreateReward'
  CreateReward:
    type: object
    required:
      - rewardDefinitionId
      - creditType
      - bonusCode
      - externalId
    properties:
      rewardDefinitionId:
        type: number
      creditType:
        type: string
        example: freeSpins
      bonusCode:
        type: string
      externalId:
        type: string
      description:
        type: string
      validity:
        type: string
        format: date-time
        example: null
      price:
        type: number
        example: null
      cost:
        type: number
        example: null
      spins:
        type: number
        example: null
      spinValue:
        type: number
        example: null
      spinType:
        type: string
        example: null
      gameId:
        type: number
        example: null
      currency:
        type: string
        example: null
      metadata:
        type: object
        example: null
      active:
        type: boolean
  CreateRewardResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          rewardId:
            type: number
  CreditReward:
    type: object
    required:
      - playerId
    properties:
      playerId:
        type: number
      externalLedgerId:
        type: string
      count:
        type: number
        example: 1
  CreditRewardResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          ledgers:
            type: array
            items:
              type: object
              properties:
                id:
                  type: number
                rewardId:
                  type: number
  GetAllPlayerLedgersResponse:
    type: object
    properties:
      data:
        type: object
        properties:
          ledgers:
            type: array
            items:
              type: object
              properties:
                id:
                  type: number
                creditDate:
                  type: string
                  format: 'date-time'
                useDate:
                  type: string
                  format: 'date-time'
                expires:
                  type: string
                  format: 'date-time'
                externalId:
                  type: string
                result:
                  type: string
                groupId:
                  type: number
                quantity:
                  type: number
                game:
                  $ref: '#/definitions/CreateGame'
                reward:
                  $ref: '#/definitions/CreateReward'
  OKResponse:
    type: "object"
    properties:
      data:
        type: "object"
        required:
          - "ok"
        properties:
          ok:
            type: "boolean"
  ErrorResponse:
    type: "object"
    properties:
      error:
        type: "object"
        required:
          - "message"
        properties:
          message:
            type: "string"
