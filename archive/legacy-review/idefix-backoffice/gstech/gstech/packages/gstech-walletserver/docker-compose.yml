version: '3'

services:
  gstech-walletserver:
    build:
      context: ../../
      dockerfile: packages/gstech-walletserver/Dockerfile
    image: gstech-walletserver
    container_name: gstech-walletserver
    ports:
      - "4003:3003"
    networks:
      - gstech
    restart: always
    deploy:
      restart_policy:
        condition: on-failure
    environment:
      NODE_ENV: development
      PORT: 3003
      REDIS_HOST: gstech-redis
      WALLET_URL: http://gstech-backend:3005/api/v1/wallet
      BACKEND_URL: http://gstech-backend:3001
      LOTTO_BACKEND_URL: http://lotto-backend:3040/api/v1/lottocasino

networks:
  gstech:
    external: true
