version: '3'

services:
  gstech-minio:
    image: minio/minio:RELEASE.2017-08-05T00-00-53Z
    platform: linux/amd64
    container_name: gstech-minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
    command: server /export
    networks:
      - gstech

networks:
  gstech:
    external: true
