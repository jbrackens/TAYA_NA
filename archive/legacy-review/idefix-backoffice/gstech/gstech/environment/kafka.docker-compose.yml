version: '3'

services:
  gstech-zookeeper:
    platform: linux/amd64
    container_name: gstech-zookeeper
    image: bitnami/zookeeper:latest
    environment:
      ZOO_PORT_NUMBER: 2181
      ALLOW_ANONYMOUS_LOGIN: 'yes'
    ports:
      - '2181:2181'
    networks:
      - gstech

  gstech-kafka:
    container_name: gstech-kafka
    image: bitnami/kafka:2.6.0
    environment:
      ALLOW_PLAINTEXT_LISTENER: 'yes'
      KAFKA_CFG_LISTENERS: 'INTERNAL://0.0.0.0:19092,EXTERNAL://0.0.0.0:9092'
      KAFKA_CFG_ADVERTISED_LISTENERS: 'INTERNAL://gstech-kafka:19092,EXTERNAL://localhost:9092'
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CFG_ZOOKEEPER_CONNECT: 'gstech-zookeeper:2181'
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_CFG_DELETE_TOPIC_ENABLE: 'true'
      # KAFKA_CREATE_TOPICS: "topic1:1:1" #[OLD]wurstmeister/kafka
    ports:
      - 9092:9092
    depends_on:
      - gstech-zookeeper
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gstech

  gstech-kafka-manager:
    platform: linux/amd64
    image: sheepkiller/kafka-manager:latest
    ports:
      - 9011:9000
    links:
      - gstech-zookeeper
      - gstech-kafka
    environment:
      ZK_HOSTS: gstech-zookeeper:2181
      APPLICATION_SECRET: letmein
      KM_ARGS: -Djava.net.preferIPv4Stack=true
    networks:
      - gstech

  gstech-kafdrop:
    platform: linux/amd64
    image: obsidiandynamics/kafdrop
    restart: 'no'
    ports:
      - 9012:9000
    environment:
      KAFKA_BROKERCONNECT: 'gstech-kafka:19092'
      # SCHEMAREGISTRY_CONNECT: "gstech-schema-registry:8081"
    depends_on:
      - gstech-kafka
    networks:
      - gstech

  gstech-schema-registry:
    platform: linux/amd64
    image: confluentinc/cp-schema-registry:5.4.0
    ports:
      - 8081:8081
    environment:
      SCHEMA_REGISTRY_HOST_NAME: gstech-schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'PLAINTEXT://gstech-kafka:19092'
    depends_on:
      - gstech-zookeeper
      - gstech-kafka
    networks:
      - gstech

networks:
  gstech:
    external: true
