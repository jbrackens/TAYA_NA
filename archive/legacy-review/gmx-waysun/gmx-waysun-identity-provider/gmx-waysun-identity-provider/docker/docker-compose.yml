version: '3.0'

services:
  keycloak:
    image: stella-identity-provider:latest
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.identity_provider.rule=PathPrefix(`/auth/`)"
      - "traefik.http.services.identity_provider.loadbalancer.server.port=8080"
    env_file:
      - local.env
    entrypoint: ["/opt/keycloak/bin/kc.sh", "start-dev",  "-Dkeycloak.profile.feature.upload_scripts=enabled", "-Dkeycloak.profile.feature.scripts=enabled" ]
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          memory: 512M

networks:
  default:
    external:
      name: gmx-internal # a network used in gmx-traefik
