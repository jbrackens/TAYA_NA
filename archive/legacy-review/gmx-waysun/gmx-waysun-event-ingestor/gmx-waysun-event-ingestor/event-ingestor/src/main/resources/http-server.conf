stella {
  event-ingestor {
    enable-interactive-shutdown = false
    event-publication-mode = publishDirectlyToKafka
    event-publication-mode = ${?EVENT_INGESTOR_EVENT_PUBLICATION_MODE}

    # eventually we'll need some proper, secure way of storing this
    secret-box-hex-key = ea87def016584b3c84e5cdbea4dcc868ea87def016584b3c84e5cdbea4dcc868
    secret-box-hex-key = ${?EVENT_INGESTOR_SECRET_BOX_HEX_KEY}

    test-user-id = "b080f663-ed46-4b58-8c85-810cef8358ea"
    test-user-id = ${?EVENT_INGESTOR_TEST_USER_ID}

    test-project-id = "2353130a-e2b3-47e9-a2cb-3ade99f81b03"
    test-project-id = ${?EVENT_INGESTOR_TEST_PROJECT_ID}

    http-server {
      host = "0.0.0.0"
      host = ${?EVENT_INGESTOR_HOST}
      port = "9000"
      port = ${?EVENT_INGESTOR_PORT}
      jwt {
        require-jwt-auth = true
        require-jwt-auth = ${?EVENT_INGESTOR_REQUIRE_JWT_AUTH}
        service-discovery-endpoint-uri = "http://localhost:8080/auth/realms"
        service-discovery-endpoint-uri = ${?JWT_SERVICE_DISCOVERY_URI}
        internal-service-discovery-endpoint-uri = "http://localhost:8080/auth/realms"
        internal-service-discovery-endpoint-uri = ${?JWT_INTERNAL_SERVICE_DISCOVERY_URI}
        issuer-cache-refresh-frequency = 1 hour
        issuer-cache-refresh-frequency = ${?EVENT_INGESTOR_ISSUER_CACHE_REFRESH_FREQUENCY}
        jwks-cache-refresh-frequency = 10 minutes
        jwks-cache-refresh-frequency = ${?EVENT_INGESTOR_JWKS_CACHE_REFRESH_FREQUENCY}
      }
      max-connections = 2048
    }

    open-api {
      server-url = "http://localhost:9000"
      server-url = ${?EVENT_INGESTOR_OPEN_API_SERVER_URL}
    }
  }
}
