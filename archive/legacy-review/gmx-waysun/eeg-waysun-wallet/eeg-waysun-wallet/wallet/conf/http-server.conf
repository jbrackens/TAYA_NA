stella {
  wallet {
    server {
      # eventually we'll need some proper, secure way of storing this
      secret-box-hex-key = ea87def016584b3c84e5cdbea4dcc868ea87def016584b3c84e5cdbea4dcc868
      secret-box-hex-key = ${?WALLET_SECRET_BOX_HEX_KEY}

      test-user-id = "b080f663-ed46-4b58-8c85-810cef8358ea"
      test-user-id = ${?WALLET_TEST_USER_ID}

      test-project-id = "2353130a-e2b3-47e9-a2cb-3ade99f81b03"
      test-project-id = ${?WALLET_TEST_PROJECT_ID}

      jwt {
        require-jwt-auth = true
        require-jwt-auth = ${?WALLET_REQUIRE_JWT_AUTH}
        service-discovery-endpoint-uri = "http://localhost:8080/auth/realms"
        service-discovery-endpoint-uri = ${?JWT_SERVICE_DISCOVERY_URI}
        internal-service-discovery-endpoint-uri = "http://localhost:8080/auth/realms"
        internal-service-discovery-endpoint-uri = ${?JWT_INTERNAL_SERVICE_DISCOVERY_URI}
        issuer-cache-refresh-frequency = 1 hour
        issuer-cache-refresh-frequency = ${?WALLET_ISSUER_CACHE_REFRESH_FREQUENCY}
        jwks-cache-refresh-frequency = 10 minutes
        jwks-cache-refresh-frequency = ${?WALLET_JWKS_CACHE_REFRESH_FREQUENCY}
      }

      open-api {
        server-url = "http://localhost:15000"
        server-url = ${?WALLET_OPEN_API_SERVER_URL}
      }

      wallet-akka {
        start-akka-management-and-cluster-bootstrap = false
        start-akka-management-and-cluster-bootstrap = ${?WALLET_START_AKKA_MANAGEMENT_AND_CLUSTER_BOOTSTRAP}
        wallet-entity-ask-timeout = 10 seconds
        wallet-entity-ask-timeout = ${?WALLET_ENTITY_ASK_TIMEOUT}

        state-snapshot {
          number-of-events = 100
          number-of-events = ${?WALLET_ENTITY_SNAPSHOT_NUMBER_OF_EVENTS}
          keep-n-snapshots = 3
          keep-n-snapshots = ${?WALLET_ENTITY_SNAPSHOT_KEEP_N_SNAPSHOTS}
        }

        state-persistence-failure-restart {
          min-backoff = 200.millis
          min-backoff = ${?WALLET_ENTITY_PERSISTENCE_FAILURE_RESTART_MIN_BACKOFF}
          max-backoff = 5.seconds
          max-backoff = ${?WALLET_ENTITY_PERSISTENCE_FAILURE_RESTART_MAX_BACKOFF}
          random-factor = 0.1
          random-factor = ${?WALLET_ENTITY_PERSISTENCE_FAILURE_RESTART_RANDOM_FACTOR}
        }

        wallet-transaction-projection {
          projection-name = "wallet_transactions"
          projection-name = ${?WALLET_ENTITY_TRANSACTION_PROJECTION_NAME}
          number-of-shards = 10
          number-of-shards = ${?WALLET_ENTITY_TRANSACTION_PROJECTION_SHARDS}
          parallelism-level = 1
          parallelism-level = ${?WALLET_ENTITY_TRANSACTION_PROJECTION_PARALLELISM_LEVEL}
        }
      }
    }
  }
}
