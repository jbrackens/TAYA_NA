include "http-server"
include "persistence"
include "play"

akka {
  actor {
    provider = cluster

    serializers {
      circe-json = "stella.wallet.services.StellaCirceAkkaSerializer"
    }

    serialization-bindings {
      "stella.wallet.models.StellaCirceAkkaSerializable" = circe-json
    }
  }

  cluster {
    roles = ["wallet"]

    min-nr-of-members = 1

    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"

    sharding {
      number-of-shards = 100
      passivate-idle-entity-after = 5 minutes
    }
  }

  persistence {
    journal {
      plugin = "jdbc-journal"
      auto-start-journals = ["jdbc-journal"]
    }
    snapshot-store {
      plugin = "jdbc-snapshot-store"
      auto-start-snapshot-stores = ["jdbc-snapshot-store"]
    }
  }
}
