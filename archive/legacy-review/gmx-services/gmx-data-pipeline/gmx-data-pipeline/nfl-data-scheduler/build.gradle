plugins {
    // Apply the scala plugin to add support for Scala
    id "application"
}

ext {
    akkaVersion = "2.5.16"
}

dependencies {
    implementation "org.scala-lang:scala-library:${scalaVersion}"
    implementation "com.typesafe.akka:akka-actor_${scalaDepVersion}:${akkaVersion}"
    implementation "com.typesafe.akka:akka-slf4j_2.12:2.5.16"
    implementation "com.cronutils:cron-utils:7.0.5"
    implementation "org.scalaj:scalaj-http_2.12:2.4.1"

    testImplementation "com.typesafe.akka:akka-testkit_${scalaDepVersion}:${akkaVersion}"
}

// In this section you declare where to find the dependencies of your project
repositories {
    // Use jcenter for resolving your dependencies.
    // You can declare any Maven/Ivy/file repository here.
    jcenter()
}

mainClassName = "NFLDataScheduler"