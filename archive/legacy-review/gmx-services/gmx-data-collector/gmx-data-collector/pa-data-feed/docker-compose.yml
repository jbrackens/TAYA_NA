version: "3"

services:
  # forwards to host via 'dockerhost' name
  dockerhost:
    image: qoomon/docker-host
    cap_add: [ 'NET_ADMIN', 'NET_RAW' ]
    restart: on-failure

  # apps
  pa-data-feed:
    image: '259420793117.dkr.ecr.eu-west-1.amazonaws.com/gmx-data-collector/pa-data-feed:latest'
    ports:
      - "8080:8080"
    env_file:
      - .env
