# Elasticsearch host
es_host: 10.3.12.50

# Elasticsearch port
es_port: 9200

# Rule name, must be unique
name: "BET-AND-WATCH: Missing stream"
alert_subject: "BET-AND-WATCH: {:.7}: Missing stream"
alert_subject_args:
  - docker.container.labels.com.amazonaws.ecs.cluster

# Type of alert.
type: frequency
num_events: 1
timeframe:
  seconds: 1

# Send one per hour
realert:
  minutes: 60

# Index to search, wildcard supported
index: filebeat-*

# A list of Elasticsearch filters used for find events
# These filters are joined with AND and nested in a filtered query
# For more info: http://www.elasticsearch.org/guide/en/elasticsearch/reference/current/query-dsl.html
filter:
  - bool:
      filter:
        - match_phrase:
            message: "Missing stream for SBT events"
        - term:
            fields.environment: "prod"

# Include these fields in alert
include: ["logger_name", "message", "stack_trace", "docker.container.labels.com.amazonaws.ecs.cluster", "docker.container.labels.module", "docker.container.labels.project", "docker.container.labels.vcs-ref", "meta.cloud.instance_id"]

# The alert is use when a match is found
alert:
  - "email"

# a list of email addresses to send alerts to
email:
  #- "dev-ops-alerts@flipsports.net"
  - "sebastian@flipsports.com"
#- "support@flipsports.com"