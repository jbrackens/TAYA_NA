
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>SportNation Login</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Poppins:700" rel="stylesheet">
  <style>
.forgot-password {
  margin-top: 20px;
}
.forgot-password .btn {
    width: 100%;
    background: #a09795;
}
/* Variables */
.actions {
  position: relative;
  margin-bottom: 30px;
  border: 1px solid #ff521d;
  border-radius: 25px;
  background: #ff521d;
}
.actions .btn {
    display: block;
    width: 50%;
    float: left;
    margin: 0 !important;
}
.actions .btn.btn-active {
      color: #ff521d;
      background: #ffffff;
      border-radius: 25px;
}
.actions:after {
    content: " ";
    /* Older browser do not support empty content */
    visibility: hidden;
    display: block;
    height: 0;
    clear: both;
}
/* Variables */
/* Styles */
body,
html {
  width: 100%;
  height: 100%;
  margin: 0;
}
* {
  box-sizing: border-box;
}
body {
  background: #252525;
  font-size: 16px;
  font-family: "Roboto", sans-serif;
}
.text-center {
  text-align: center;
}
.text-left {
  text-align: left;
}
.text-right {
  text-align: right;
}
h1, h2, h3, h4, h5, h6 {
  color: #ff521d;
  text-transform: uppercase;
}
h2 {
  font-size: 18px;
  text-transform: uppercase;
  margin-top: 30px;
}
h2 + p {
  margin-top: 0;
}
h1, h2, h3, h4, h5, h6, p {
  padding: 0 5px;
}
h2 + form {
  margin-top: 20px;
}

/* Variables */
/* Functions */
/* Styles */
input[type="text"],
input[type="email"],
input[type="number"],
input[type="password"] {
  background: #ffffff;
  color: #7d7d7d;
  height: 40px;
  padding: 5px 30px;
  line-height: 30px;
  font-size: 16px;
  border: 0;
  border-radius: 25px;
  outline: none;
}
input[type="text"]:hover,
  input[type="email"]:hover,
  input[type="number"]:hover,
  input[type="password"]:hover {
    border: 0;
}
input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="number"]:focus,
  input[type="password"]:focus {
    border: 0;
}
input[type="text"].input-block,
  input[type="email"].input-block,
  input[type="number"].input-block,
  input[type="password"].input-block {
    width: 100%;
}
input[type="button"],
button,
.btn {
  display: inline-block;
  text-align: center;
  background: #ff521d;
  height: 40px;
  padding: 5px 30px;
  line-height: 30px;
  font-size: 16px;
  border: 0;
  border-radius: 25px;
  outline: none;
  text-transform: uppercase;
  color: #ffffff;
  text-decoration: none;
  cursor: pointer;
  font-weight: bold;
  font-family: Poppins ,sans-serif;
}
input[type="button"]:disabled,
  button:disabled,
  .btn:disabled {
    cursor: auto;
}
input[type="button"].btn-block,
  button.btn-block,
  .btn.btn-block {
    display: block;
    width: 100%;
}
input[type="button"].btn-large,
  button.btn-large,
  .btn.btn-large {
    height: 50px;
}
input[type="button"] + input[type="button"],
  button + input[type="button"],
  .btn + input[type="button"], input[type="button"] +
  button,
  button +
  button,
  .btn +
  button, input[type="button"] +
  .btn,
  button +
  .btn,
  .btn +
  .btn {
    margin-top: 10px;
}
.form-group {
  display: block;
  margin-top: 10px;
}
.form-group + input[type="button"],
  .form-group + button,
  .form-group + .btn {
    margin-top: 30px;
}
.form-group input[type="text"],
  .form-group input[type="email"],
  .form-group input[type="number"],
  .form-group input[type="password"] {
    width: 100%;
}
.form-field-error {
  display: inline-block;
  color: #69200a;
  font-weight: bold;
  font-size: 0.8rem;
  margin: 10px 32px 5px 18px;
}
.form-field-error:before {
    content: "* ";
    display: inline-block;
    width: 14px;
    text-align: center;
}
.form-error {
  color: #69200a;
  font-weight: bold;
  font-size: 0.8rem;
}
.btn-loader {
  transition: color 0.4s linear;
}
.btn-loading {
  position: relative;
  color: #ff521d;
}
.btn-loading:before, .btn-loading:after {
    content: "";
    position: absolute;
    top: 5px;
    width: 30px;
    height: 30px;
    left: 50%;
    margin-left: -15px;
    border-radius: 50%;
    background-color: #fff;
    opacity: 0.6;
    animation: bounce 2.0s infinite ease-in-out;
}
.btn-loading:after {
    animation-delay: -1.0s;
}
@keyframes bounce {
0%,
  100% {
    transform: scale(0);
}
50% {
    transform: scale(1);
}
}
.btn[href*="/fb/"] {
  background: #3b5b99;
}
.btn[href*="/gp/"] {
  background: #cc181e;
}
.btn[href*="/tw/"] {
  background: #2daae1;
}
.wrapper {
  background: #ebebeb;
  padding: 2rem 0;
}
.container {
  max-width: 350px;
  margin: 0 auto;
}
.row {
  clear: both;
  width: 100%;
}
.row + .row {
    margin-top: 20px;
}
.fade-enter-active, .fade-leave-active {
  transition: opacity .3s;
}
.fade-enter, .fade-leave-to {
  opacity: 0;
}
.notice {
  font-size: 1.5rem;
  text-align: center;
  margin: 20px 0;
  color: #ff521d;
}
.social {
  margin-top: 20px;
}
.card {
  max-width: 350px;
  padding: 20px 25px 20px;
  margin: 20px auto;
}
header, footer {
  overflow: hidden;
}
.header-logo {
  padding: 2.5rem 2rem;
  text-align: center;
  /*@media screen and (max-width: $break-tablet-small) {
    padding-top: 5rem;
  }*/
}
.header-logo img {
    max-width: 254px;
    display: block;
    width: 100%;
    height: auto;
    max-height: 100%;
    margin: 0 auto;
    overflow: hidden;
}
.footer-text {
  display: block;
  max-width: 350px;
  margin: 0 auto;
  padding: 1.5rem;
  text-transform: uppercase;
  font-weight: bold;
  color: #ffffff;
  font-family: 'Poppins';
  font-size: 14px;
}
.footer-logos {
  padding: 0 1.5rem 2.5rem 1.5rem;
  text-align: center;
  max-width: 350px;
  margin: 0 auto;
}
.footer-logos img {
    display: block;
    float: left;
    width: 50%;
    max-width: 254px;
    height: auto;
    max-height: 100%;
    margin: 0 auto;
    overflow: hidden;
}
.footer-logos img:first-child {
      padding-right: 0.75rem;
}
.footer-logos img:last-child {
      padding-left: 0.75rem;
}
</style></head>
  <body>
    <header>
      <div class="header-logo">
        <img src="https://cdn.sportnation.com/app/themes/bob-media/dist/images/svg/logo-main.svg">
      </div>
    </header>
    <div class="wrapper">
      <div class="container">
        <div id="app"></div>
      </div>
    </div>
    <footer>
      <p class="footer-text">
        ...And your login works across our family of sites!
      </p>
      <div class="footer-logos">
        <img src="https://cdn.sportnation.com/app/themes/bob-media/dist/images/svg/logo-main.svg">
        <img src="https://cdn.sportnation.com/app/themes/bob-media/dist/images/svg/logo-main-rz.svg">
      </div>
    </footer>
    <script type="text/x-template" id="client_id"><![CDATA[{{ client_id }}]]></script>
    <script type="text/x-template" id="non_field_errors"><![CDATA[{% if form.non_field_errors %}{{ form.non_field_errors }}{% endif %}]]></script>
    <script type="text/x-template" id="csrf_token"><![CDATA[{% csrf_token %}]]></script>
    <script type="text/x-template" id="social_buttons"><![CDATA[{% include 'oidc_social/buttons.html' with next=next client_id=client_id %}]]></script>
    <script type="text/x-template" id="next"><![CDATA[<input type="hidden" name="next" value="{{ next }}">]]></script>
